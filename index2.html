<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차수/과목별 선발자 명단</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
  font-weight: 45 920;
}

:root{
  --ink:#0E1530;
  --ink-soft:#6B7590;
  --paper:#F3F5FA;
  --card:#FFFFFF;
  --line:#E3E7F1;
  --hero-1:#0B1230;
  --hero-2:#1B2557;
  --hero-line:rgba(255,255,255,0.12);
  --white-soft:rgba(255,255,255,0.72);
  --radius:14px;

  /* 차수별 색상 팔레트 (등장 순서대로 순환 배정) */
  --c0-solid:#2F5FE0; --c0-tint:#E9EEFD;
  --c1-solid:#12946B; --c1-tint:#E1F5EC;
  --c2-solid:#C2790E; --c2-tint:#FBF0DD;
  --c3-solid:#DD5B3F; --c3-tint:#FCE8E3;
  --c4-solid:#7B42E0; --c4-tint:#F0E9FE;
  --c5-solid:#0E8E8E; --c5-tint:#DFF4F4;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{ scroll-behavior:smooth; }
body{
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a:focus-visible, button:focus-visible, input:focus-visible{
  outline:2px solid #8EF0D3;
  outline-offset:2px;
  border-radius:8px;
}

/* ---------- HERO ---------- */
.hero{
  position:relative;
  background:linear-gradient(155deg, var(--hero-1) 0%, var(--hero-2) 65%, #24306B 100%);
  overflow:hidden;
  padding:52px 24px 26px;
}
.hero::before{
  content:'';
  position:absolute;
  top:-120px; right:-100px;
  width:420px; height:420px;
  background:radial-gradient(circle, rgba(47,95,224,0.55) 0%, rgba(47,95,224,0) 70%);
  pointer-events:none;
}
.hero::after{
  content:'';
  position:absolute;
  bottom:-160px; left:-80px;
  width:360px; height:360px;
  background:radial-gradient(circle, rgba(18,148,107,0.4) 0%, rgba(18,148,107,0) 70%);
  pointer-events:none;
}
.hero-inner{
  position:relative;
  max-width:1040px;
  margin:0 auto;
}

.hero-login-btn{
  position:absolute;
  top:0;
  right:24px;
  display:flex;
  align-items:center;
  gap:6px;
  padding:9px 14px;
  border:1.5px solid var(--hero-line);
  border-radius:999px;
  background:rgba(255,255,255,0.07);
  color:var(--white-soft);
  font-family:inherit;
  font-size:14.5px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  transition:border-color .15s ease, color .15s ease, background .15s ease;
  z-index:5;
}
.hero-login-btn:hover{ border-color:#8EF0D3; color:#fff; background:rgba(255,255,255,0.12); }
.hero-login-btn svg{ width:14px; height:14px; stroke:currentColor; flex-shrink:0; }
.hero-login-btn.is-on{
  border-color:#8EF0D3;
  background:rgba(142,240,211,0.14);
  color:#fff;
}
.hero-login-btn.is-on .hero-login-dot{
  display:inline-block;
  width:6px; height:6px; border-radius:50%;
  background:#8EF0D3;
}

@media (max-width:520px){
  .hero-login-btn{ position:static; margin-bottom:16px; }
}

/* ---------- STICKY CONTROL BAR (search + tabs) ---------- */
.control-bar{
  position:sticky;
  top:0;
  z-index:40;
  background:linear-gradient(155deg, var(--hero-2) 0%, #24306B 100%);
  padding:16px 24px;
  box-shadow:0 12px 26px rgba(9,13,33,0.2);
}
.control-inner{
  max-width:1040px;
  margin:0 auto;
}

.dot-legend{
  display:flex;
  gap:5px;
  margin-bottom:16px;
}
.dot-legend span{
  width:6px; height:6px; border-radius:50%;
  display:inline-block;
}

h1{
  font-size:clamp(37px,5.4vw,53px);
  font-weight:800;
  letter-spacing:-0.02em;
  margin:0 0 12px;
  line-height:1.32;
  cursor:pointer;
  background:linear-gradient(100deg, #FFFFFF 20%, #B9C6FF 60%, #8EF0D3 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.title-year{
  display:block;
  font-size:0.5em;
  font-weight:700;
  letter-spacing:0.1em;
  margin-bottom:6px;
  color:#4FA3FF;
}

.title-amp{
  font-size:0.62em;
  font-weight:700;
  vertical-align:middle;
  color:#FFFFFF;
  opacity:0.85;
}

.title-ai{
  color:var(--hero-1);
  font-weight:900;
  -webkit-text-stroke:1.3px #fff;
  text-shadow:
    -1px -1px 0 #fff, 1px -1px 0 #fff,
    -1px  1px 0 #fff, 1px  1px 0 #fff,
     0   -1.4px 0 #fff, 0    1.4px 0 #fff,
    -1.4px 0    0 #fff, 1.4px 0    0 #fff;
}

.subtitle{
  margin:-2px 0 14px;
  font-size:20px;
  font-weight:700;
  letter-spacing:0.01em;
  color:rgba(255,255,255,0.85);
}

.sub{
  font-size:16px;
  color:var(--white-soft);
  margin:0 0 30px;
  line-height:1.6;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}

.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:22px;
  flex-wrap:wrap;
}

.search-box{
  position:relative;
  flex:1;
  min-width:220px;
}

.search-box input{
  width:100%;
  padding:13px 40px 13px 40px;
  border:1.5px solid var(--hero-line);
  border-radius:11px;
  font-size:16.5px;
  font-family:inherit;
  background:rgba(255,255,255,0.07);
  color:#fff;
  transition:border-color .15s ease, background .15s ease;
}
.search-box input::placeholder{ color:rgba(255,255,255,0.45); }
.search-box input:focus{
  outline:none;
  border-color:#8EF0D3;
  background:rgba(255,255,255,0.12);
}
.search-box svg{
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  width:16px;
  height:16px;
  stroke:rgba(255,255,255,0.55);
}
.search-clear{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  width:24px;
  height:24px;
  padding:0;
  margin:0;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  display:none;
  align-items:center;
  justify-content:center;
  line-height:0;
  cursor:pointer;
  transition:background .15s ease;
}
.search-clear.visible{ display:flex; }
.search-clear:hover{ background:rgba(255,255,255,0.22); }
.search-clear svg{
  display:block;
  width:12px; height:12px;
  stroke:rgba(255,255,255,0.85);
  pointer-events:none;
}

.search-hint{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:13px;
  font-weight:700;
  font-family:inherit;
  color:rgba(255,255,255,0.45);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:5px;
  padding:2px 6px;
  pointer-events:none;
  transition:opacity .15s ease;
}
.search-hint.hidden{ opacity:0; }

.refresh-btn{
  display:flex;
  align-items:center;
  gap:6px;
  padding:12px 15px;
  border:1.5px solid var(--hero-line);
  border-radius:11px;
  background:rgba(255,255,255,0.07);
  color:var(--white-soft);
  font-family:inherit;
  font-size:15.5px;
  font-weight:600;
  cursor:pointer;
  transition:border-color .15s ease, color .15s ease, background .15s ease;
  white-space:nowrap;
}
.refresh-btn:hover{ border-color:#8EF0D3; color:#fff; background:rgba(255,255,255,0.12); }
.refresh-btn svg{ width:15px; height:15px; stroke:currentColor; transition:transform .5s ease; }
.refresh-btn.spinning svg{ animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ---------- BACK BUTTON ---------- */
.back-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 4px;
  margin-bottom:14px;
  border:none;
  background:none;
  color:var(--white-soft);
  font-family:inherit;
  font-size:15.5px;
  font-weight:700;
  cursor:pointer;
  transition:color .15s ease;
}
.back-btn:hover{ color:#fff; }
.back-btn svg{ width:15px; height:15px; stroke:currentColor; }

/* ---------- TABS ---------- */
.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  padding-bottom:2px;
}

.tab{
  position:relative;
  padding:9px 16px;
  border-radius:999px;
  border:1.5px solid var(--hero-line);
  background:rgba(255,255,255,0.06);
  color:var(--white-soft);
  font-family:inherit;
  font-size:15.5px;
  font-weight:700;
  cursor:pointer;
  transition:all .18s ease;
  display:flex;
  align-items:center;
  gap:7px;
}
.tab .swatch{
  width:8px; height:8px; border-radius:50%;
  flex-shrink:0;
}
.tab:hover{ border-color:rgba(255,255,255,0.4); color:#fff; }
.tab.active{
  color:var(--ink);
  border-color:transparent;
  box-shadow:0 6px 16px rgba(0,0,0,0.25);
}
.tab .count{
  opacity:.75;
  font-weight:600;
  margin-left:1px;
}

/* ---------- BODY ---------- */
.wrap{
  max-width:1040px;
  margin:0 auto;
  padding:26px 24px 80px;
}

.status-line{
  font-size:14.5px;
  color:var(--ink-soft);
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:6px;
}
.status-dot{
  width:6px; height:6px; border-radius:50%;
  background:#12946B;
  flex-shrink:0;
}
.status-dot.error{ background:#DD5B3F; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
  gap:14px;
}

.card{
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:20px;
  padding:22px 20px 19px;
  min-height:158px;
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:var(--radius);
  text-align:left;
  font-family:inherit;
  color:inherit;
  overflow:hidden;
  cursor:pointer;
  transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  animation:cardIn .35s ease backwards;
}
.card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:4px;
  background:var(--accent, var(--c0-solid));
}
.card:hover{
  border-color:var(--accent, var(--c0-solid));
  transform:translateY(-3px);
  box-shadow:0 14px 30px rgba(14,21,48,0.12);
}

@keyframes cardIn{
  from{ opacity:0; transform:translateY(8px); }
  to{ opacity:1; transform:translateY(0); }
}
@media (prefers-reduced-motion: reduce){
  .card{ animation:none; }
}

.badge{
  flex-shrink:0;
  font-size:13.5px;
  font-weight:800;
  padding:4px 9px;
  border-radius:6px;
  background:var(--accent-tint, var(--c0-tint));
  color:var(--accent, var(--c0-solid));
  white-space:nowrap;
}

.go-arrow{
  flex-shrink:0;
  width:28px;
  height:28px;
  border-radius:50%;
  background:var(--paper);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .15s ease, transform .15s ease;
}
.card:hover .go-arrow{
  background:var(--accent, var(--c0-solid));
  transform:translate(2px,-2px);
}
.go-arrow svg{ width:13px; height:13px; stroke:var(--ink-soft); transition:stroke .15s ease; }
.card:hover .go-arrow svg{ stroke:#fff; }

.card-body{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card-meta{
  display:flex;
  flex-direction:column;
  gap:5px;
}
.meta-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:14.5px;
  font-weight:600;
  color:var(--ink-soft);
}
.meta-item svg{
  width:13px; height:13px;
  stroke:var(--ink-soft);
  flex-shrink:0;
}

.card-title{
  font-size:20px;
  font-weight:800;
  letter-spacing:-0.01em;
  color:var(--ink);
  line-height:1.35;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.card-bottom{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.round-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
  gap:16px;
}

.round-card{
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:26px;
  padding:24px 22px 20px;
  min-height:128px;
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:var(--radius);
  cursor:pointer;
  text-align:left;
  font-family:inherit;
  overflow:hidden;
  transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  animation:cardIn .35s ease backwards;
}
.round-card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:5px;
  background:var(--accent, var(--c0-solid));
}
.round-card:hover{
  border-color:var(--accent, var(--c0-solid));
  transform:translateY(-3px);
  box-shadow:0 14px 30px rgba(14,21,48,0.12);
}
.round-card-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}
.round-eyebrow{
  font-size:13.5px;
  font-weight:800;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--accent, var(--c0-solid));
}
.round-name{
  font-size:21px;
  font-weight:800;
  color:var(--ink);
  line-height:1.35;
}
.round-count{
  font-size:14.5px;
  font-weight:700;
  color:var(--ink-soft);
}

.empty, .loading, .error-box{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
  font-size:16px;
}
.error-box{ color:#DD5B3F; }
.error-box a{ color:#2F5FE0; }

.spinner{
  width:22px; height:22px;
  border:2.5px solid var(--line);
  border-top-color:#2F5FE0;
  border-radius:50%;
  margin:0 auto 12px;
  animation:spin .7s linear infinite;
}

/* ---------- 시트 뷰어/편집 패널 ---------- */
.sheet-panel-overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:110;
  background:rgba(10,15,36,0.6);
  backdrop-filter:blur(2px);
  align-items:center;
  justify-content:center;
  padding:8px;
}
.sheet-panel-overlay.visible{ display:flex; }

.sheet-panel{
  width:min(98vw, 1440px);
  height:min(92vh, 840px);
  background:var(--card);
  border-radius:18px;
  box-shadow:0 30px 70px rgba(9,13,33,0.4);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  animation:cardIn .25s ease;
}

.sheet-panel-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  padding:18px 22px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.sheet-panel-eyebrow{
  margin:0 0 4px;
  font-size:13.5px;
  font-weight:800;
  letter-spacing:0.04em;
  color:#2F5FE0;
}
.sheet-panel-title{
  margin:0;
  font-size:19px;
  font-weight:800;
  color:var(--ink);
  line-height:1.35;
}
.sheet-panel-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.sheet-panel-status{
  font-size:14px;
  font-weight:600;
  color:var(--ink-soft);
  white-space:nowrap;
}
.sheet-panel-status.dirty{ color:#C2790E; }
.sheet-panel-status.saved{ color:#12946B; }

.sheet-panel-save{
  padding:9px 15px;
  border:none;
  border-radius:9px;
  background:#2F5FE0;
  color:#fff;
  font-family:inherit;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  transition:opacity .15s ease, transform .15s ease;
}
.sheet-panel-save:hover{ transform:translateY(-1px); }
.sheet-panel-save:disabled{ opacity:0.5; cursor:default; transform:none; }

.sheet-panel-iconbtn{
  width:32px; height:32px;
  padding:0; margin:0;
  border:none; border-radius:50%;
  background:var(--paper);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  transition:background .15s ease;
}
.sheet-panel-iconbtn:hover{ background:var(--line); }
.sheet-panel-iconbtn svg{ width:14px; height:14px; stroke:var(--ink-soft); }

.sheet-panel-login-banner{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 22px;
  background:#EEF3FF;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
  font-size:15px;
  font-weight:600;
  color:#1B3A9E;
}
.sheet-panel-login-btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:#2F5FE0;
  color:#fff;
  font-family:inherit;
  font-size:14.5px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
}
.sheet-panel-login-btn:disabled{ opacity:0.6; cursor:default; }

.sheet-panel-search{
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 22px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.sheet-panel-search svg{ width:15px; height:15px; stroke:var(--ink-soft); flex-shrink:0; }
.sheet-panel-search input{
  flex:1;
  border:1.5px solid var(--line);
  border-radius:9px;
  padding:8px 12px;
  font-size:14px;
  font-family:inherit;
  color:var(--ink);
  background:var(--paper);
  transition:border-color .15s ease, background .15s ease;
}
.sheet-panel-search input:focus{
  outline:none;
  border-color:#2F5FE0;
  background:#fff;
}
.sheet-panel-search-count{
  font-size:12.5px;
  font-weight:700;
  color:var(--ink-soft);
  white-space:nowrap;
  flex-shrink:0;
}

.sheet-panel-body{
  flex:1;
  overflow:auto;
  padding:0;
}

table.sheet-table{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
}
table.sheet-table td{
  border:1px solid var(--line);
  padding:0;
  vertical-align:middle;
  text-align:center;
}
table.sheet-table tr.header-row td{
  background:#153D64;
  color:#fff;
  font-weight:800;
  border-bottom:2px solid #2F5FE0;
  position:sticky;
  top:0;
  z-index:2;
}
table.sheet-table tr.header-row td input{
  color:#fff;
  font-weight:800;
}
table.sheet-table tr.header-row td input::placeholder{ color:rgba(255,255,255,0.6); }
table.sheet-table td input{
  width:100%;
  min-width:0;
  border:none;
  background:transparent;
  padding:7px 10px;
  font-size:16px;
  font-family:inherit;
  color:var(--ink);
  text-align:center;
}
table.sheet-table td input:focus{
  outline:2px solid #8EF0D3;
  outline-offset:-2px;
  background:#fff;
  position:relative;
  z-index:1;
}
table.sheet-table tr.header-row td input:focus{
  background:#153D64;
  color:#fff;
}
table.sheet-table td select{
  width:100%;
  min-width:90px;
  border:none;
  background:transparent;
  text-align:center;
  text-align-last:center;
  padding:7px 10px;
  font-size:16px;
  font-family:inherit;
  font-weight:700;
  color:var(--ink);
  cursor:pointer;
  appearance:none;
  -webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7590' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;
  background-position:right 8px center;

<script>
const SHEET_ID = '1hg2PVIp408jOFEdNLEPlE8H9ifUqMNJG1ln4WZQ5NUs';
const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5분마다 자동 새로고침

const CLIENT_ID = '61217257667-2j0n0g7370h0ekl85sql5dq0r7ntodbr.apps.googleusercontent.com';
const SHEETS_SCOPE = 'https://www.googleapis.com/auth/spreadsheets';

let accessToken = null;

// 차수별 색상 팔레트 (등장 순서대로 순환 배정)
const PALETTE = [
  { solid: '#2F5FE0', tint: '#E9EEFD' },
  { solid: '#12946B', tint: '#E1F5EC' },
  { solid: '#C2790E', tint: '#FBF0DD' },

  { solid: '#7B42E0', tint: '#F0E9FE' },

];

let allRows = [];   // [{round, subject, session, period, link}]
let rounds = [];    // 차수 목록 (등장 순서)
let roundColor = {}; // round -> {solid, tint}
let activeTab = 'ALL';
let currentView = 'detail'; // 기본값: 검색창 바로 아래 차수 탭 + 과목 리스트를 바로 보여줌

/* ================= 시트 목록 읽기 (공개 gviz, 로그인 불필요) ================= */

function naturalKeyForRound(r){
  const m = String(r).match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : Number.POSITIVE_INFINITY;
}

function fetchArbitrarySheet(sheetId, gid){
  return new Promise((resolve, reject) => {
    const callbackName = 'gvizCb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    const script = document.createElement('script');

    const timeoutId = setTimeout(() => {
      cleanup();
      reject(new Error('요청 시간이 초과되었습니다 (10초). 네트워크 상태를 확인해주세요.'));
    }, 10000);

    function cleanup(){
      clearTimeout(timeoutId);
      delete window[callbackName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(response){
      cleanup();
      if(!response || response.status === 'error'){
        const msg = (response && response.errors && response.errors[0] && response.errors[0].detailed_message)
          || '시트에 접근할 수 없습니다. 공유 설정을 확인해주세요.';
        reject(new Error(msg));
        return;
      }
      resolve(response.table);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('스크립트 로드에 실패했습니다. 시트 ID 또는 네트워크 연결을 확인해주세요.'));
    };

    const gidParam = gid ? `&gid=${encodeURIComponent(gid)}` : '';
    script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?headers=1&tqx=out:json;responseHandler:${callbackName}${gidParam}&t=${Date.now()}`;
    document.body.appendChild(script);
  });
}

function fetchSheet(){
  return fetchArbitrarySheet(SHEET_ID, null);
}

function findColIndex(cols, names){
  for(let i = 0; i < cols.length; i++){
    const label = (cols[i].label || '').trim();
    if(names.includes(label)) return i;
  }
  return -1;
}

function parseTable(table){
  const cols = table.cols || [];
  let roundIdx = findColIndex(cols, ['차수']);
  let subjectIdx = findColIndex(cols, ['과목']);
  let sessionIdx = findColIndex(cols, ['회차']);
  let periodIdx = findColIndex(cols, ['교육기간']);
  let linkIdx = findColIndex(cols, ['링크']);

  if(roundIdx === -1 || subjectIdx === -1 || linkIdx === -1){
    roundIdx = 0; subjectIdx = 1; sessionIdx = 2; periodIdx = 3; linkIdx = 4;
  }

  const rows = [];
  (table.rows || []).forEach(row => {
    const cells = row.c || [];
    const cellStr = (idx) => (idx > -1 && cells[idx] && cells[idx].v != null) ? String(cells[idx].v).trim() : '';
    const round = cellStr(roundIdx);
    const subject = cellStr(subjectIdx);
    const session = cellStr(sessionIdx);
    const period = cellStr(periodIdx);
    let link = cellStr(linkIdx);
    if(!round || !subject || !link) return;
    if(round === '차수' && subject === '과목') return; // 헤더 행이 데이터로 잘못 들어온 경우 방지
    if(!/^https?:\/\//i.test(link)) link = 'https://' + link;
    rows.push({ round, subject, session, period, link });
  });
  return rows;
}

function assignColors(){
  roundColor = {};
  rounds.forEach((r, i) => {
    roundColor[r] = PALETTE[i % PALETTE.length];
  });
}

function render(){
  const seen = new Set();
  rounds = [];
  allRows.forEach(r => { if(!seen.has(r.round)){ seen.add(r.round); rounds.push(r.round); } });
  rounds.sort((a,b) => naturalKeyForRound(a) - naturalKeyForRound(b));
  assignColors();

  const query = searchInput.value.trim().toLowerCase();
  const searching = query.length > 0;
  const mode = searching ? 'search' : currentView;
  searchClear.classList.toggle('visible', searchInput.value.length > 0);
  searchHint.classList.toggle('hidden', searchInput.value.length > 0);

  // 상단 컬러 레전드 점
  dotLegendEl.innerHTML = rounds.map(r => `<span style="background:${roundColor[r].solid}"></span>`).join('');

  // 탭 / 뒤로가기 버튼: 상세 화면일 때만 노출
  if(mode === 'detail' && rounds.length > 0){
    tabsEl.style.display = 'flex';
    backBtn.style.display = 'inline-flex';
    const tabHtml = ['ALL', ...rounds].map(r => {
      const label = r === 'ALL' ? '전체' : r;
      const count = r === 'ALL' ? allRows.length : allRows.filter(x => x.round === r).length;
      const isActive = activeTab === r;
      const color = r === 'ALL' ? '#FFFFFF' : roundColor[r].solid;
      const style = isActive ? `background:${color};` : '';
      const swatch = r === 'ALL'
        ? `<span class="swatch" style="background:linear-gradient(135deg, #2F5FE0, #8EF0D3)"></span>`
        : `<span class="swatch" style="background:${roundColor[r].solid}"></span>`;
      return `<button class="tab ${isActive ? 'active' : ''}" style="${style}" data-round="${escapeAttr(r)}">${swatch}${escapeHtml(label)} <span class="count">${count}</span></button>`;
    }).join('');
    tabsEl.innerHTML = tabHtml;
    tabsEl.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.getAttribute('data-round');
        render();
      });
    });
  } else {
    tabsEl.style.display = 'none';
    backBtn.style.display = 'none';
  }

  if(mode === 'rounds'){
    renderRoundsLanding();
    return;
  }

  let rowsToShow;
  let showBadge;
  if(mode === 'search'){
    rowsToShow = allRows.filter(r => {
      if(r.subject.toLowerCase().includes(query)) return true;
      const cached = searchCache.get(r.link);
      return cached ? cached.includes(query) : false;
    });
    showBadge = true;
  } else {
    rowsToShow = activeTab === 'ALL' ? allRows : allRows.filter(r => r.round === activeTab);
    showBadge = activeTab === 'ALL';
  }

  if(rowsToShow.length === 0){
    contentEl.innerHTML = `<div class="empty">${mode === 'search' ? '검색 결과가 없습니다.' : '표시할 과목이 없습니다.'}</div>`;
    return;
  }

  contentEl.innerHTML = `<div class="grid">` + rowsToShow.map((r, i) => {
    const c = roundColor[r.round] || PALETTE[0];
    const styleAttr = `--accent:${c.solid};--accent-tint:${c.tint};animation-delay:${Math.min(i * 30, 240)}ms`;
    return `
    <button type="button" class="card" style="${styleAttr}" data-idx="${i}">
      <div class="card-body">
        <span class="card-title">${escapeHtml(r.subject)}</span>
        ${(r.session || r.period) ? `<div class="card-meta">
          ${r.session ? `<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>${escapeHtml(r.session)}</span>` : ''}
          ${r.period ? `<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${escapeHtml(r.period)}</span>` : ''}
        </div>` : ''}
      </div>
      <div class="card-bottom">
        ${showBadge ? `<span class="badge">${escapeHtml(r.round)}</span>` : `<span></span>`}
        <span class="go-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
        </span>
      </div>
    </button>
  `;
  }).join('') + `</div>`;

  contentEl.querySelectorAll('.card').forEach(btn => {
    btn.addEventListener('click', () => {
      const row = rowsToShow[Number(btn.getAttribute('data-idx'))];
      if(row) openSheetPanel(row);
    });
  });
}

function renderRoundsLanding(){
  if(rounds.length === 0){
    contentEl.innerHTML = `<div class="empty">표시할 차수가 없습니다.</div>`;
    return;
  }
  contentEl.innerHTML = `<div class="round-grid">` + rounds.map((r, i) => {
    const c = roundColor[r];
    const count = allRows.filter(x => x.round === r).length;
    return `
    <button class="round-card" style="--accent:${c.solid};--accent-tint:${c.tint};animation-delay:${Math.min(i * 40, 240)}ms" data-round="${escapeAttr(r)}">
      <div class="round-card-top">
        <span class="round-eyebrow">차수</span>
        <span class="go-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
        </span>
      </div>
      <div>
        <div class="round-name">${escapeHtml(r)}</div>
        <div class="round-count">${count}개 과목</div>
      </div>
    </button>
  `;
  }).join('') + `</div>`;

  contentEl.querySelectorAll('.round-card').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.getAttribute('data-round');
      currentView = 'detail';
      render();
    });
  });
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

function setStatus(ok, message){
  statusEl.innerHTML = `<span class="status-dot ${ok ? '' : 'error'}"></span>${message}`;
}

async function load(isManual){
  if(isManual) refreshBtn.classList.add('spinning');
  try{
    const table = await fetchSheet();
    allRows = parseTable(table);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    setStatus(true, `마지막 업데이트: ${timeStr} · 총 ${allRows.length}개 과목`);
    render();
    prefetchAllLinkedSheets(); // 이름/소속 검색을 위해 백그라운드에서 각 시트 내용을 미리 불러온다
  }catch(err){
    console.error('시트 로드 실패:', err);
    setStatus(false, '데이터를 불러오지 못했습니다.');
    contentEl.innerHTML = `<div class="error-box">
      스프레드시트를 불러오지 못했습니다.<br>
      시트가 <strong>"링크가 있는 모든 사용자에게 공개(뷰어)"</strong>로 공유되어 있는지, 시트 ID가 올바른지 확인해주세요.<br>
      <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?usp=sharing" target="_blank" rel="noopener">스프레드시트 열기</a><br>
      <span style="display:block;margin-top:10px;font-size:13.5px;color:var(--ink-soft);">상세 오류: ${escapeHtml(err.message || String(err))}</span>
    </div>`;
  }finally{
    if(isManual) setTimeout(() => refreshBtn.classList.remove('spinning'), 400);
  }
}

/* ================= 이름/소속 검색을 위한 백그라운드 시트 프리페치 ================= */

const searchCache = new Map(); // link -> 그 시트 데이터를 소문자로 이어붙인 검색용 텍스트

async function buildSearchTextForLink(link){
  if(searchCache.has(link)) return searchCache.get(link);
  const parsed = parseSheetUrl(link);
  if(!parsed.id){ searchCache.set(link, ''); return ''; }
  try{
    const table = await fetchArbitrarySheet(parsed.id, parsed.gid);
    const cols = table.cols || [];
    const header = cols.map(c => (c.label || '').toString());
    const grid = [header];
    (table.rows || []).forEach(row => {
      const cells = row.c || [];
      grid.push(cells.map(cell => (cell && cell.f != null) ? String(cell.f) : (cell && cell.v != null ? String(cell.v) : '')));
    });
    const trimmed = trimToHeaderRow(grid);
    const dataRows = trimmed.grid.slice(1); // 헤더 제외한 실제 데이터 행만
    const text = dataRows.map(r => r.join(' ')).join(' ').toLowerCase();
    searchCache.set(link, text);
    return text;
  }catch(err){
    searchCache.set(link, ''); // 접근 불가한 시트는 조용히 건너뜀 (과목명 검색은 그대로 동작)
    return '';
  }
}

async function prefetchAllLinkedSheets(){
  const uniqueLinks = [...new Set(allRows.map(r => r.link))];
  const pending = uniqueLinks.filter(link => !searchCache.has(link));
  if(pending.length === 0) return;

  const noteEl = document.getElementById('searchReadyNote');
  let done = 0;
  const updateNote = () => {
    if(!noteEl) return;
    noteEl.style.display = 'flex';
    if(done < pending.length){
      noteEl.innerHTML = `<span class="status-dot"></span>이름/소속 검색 데이터 불러오는 중... (${done}/${pending.length})`;
    } else {
      noteEl.innerHTML = `<span class="status-dot"></span>이름/소속 검색 준비 완료`;
      setTimeout(() => { noteEl.style.display = 'none'; }, 3000);
    }
  };
  updateNote();

  await Promise.all(pending.map(async (link) => {
    await buildSearchTextForLink(link);
    done++;
    updateNote();
    // 검색 중인 화면이면 결과를 점진적으로 갱신
    if(searchInput.value.trim()) render();
  }));
}

/* ================= Google 로그인 (선발자 명단 편집용) ================= */

const AUTH_FLAG_KEY = 'sheetEditorAuthed';

function ensureTokenClient(){
  if(tokenClient) return tokenClient;
  if(!window.google || !google.accounts || !google.accounts.oauth2){
    throw new Error('Google 로그인 스크립트를 아직 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SHEETS_SCOPE,
    callback: (tokenResponse) => {
      if(tokenResponse && tokenResponse.access_token){
        accessToken = tokenResponse.access_token;
        isAdmin = true;
        try{ localStorage.setItem(AUTH_FLAG_KEY, '1'); }catch(e){ /* 저장 불가 시 무시 */ }
        updateHeroLoginUI();
        // 현재 열려있는 패널이 있으면 바로 편집 모드로 전환
        if(sheetPanelOverlay.classList.contains('visible') && currentPanelRow){
          loadPanelEditable();
        }
      }
    },
  });
  return tokenClient;
}

function updateHeroLoginUI(){
  heroLoginBtn.classList.toggle('is-on', isAdmin);
  heroLoginBtn.innerHTML = isAdmin
    ? `<span class="hero-login-dot"></span>로그인됨 · 로그아웃`
    : `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>로그인`;
}

heroLoginBtn.addEventListener('click', () => {
  if(isAdmin){
    if(accessToken && window.google && google.accounts && google.accounts.oauth2){
      google.accounts.oauth2.revoke(accessToken, () => {});
    }
    accessToken = null;
    isAdmin = false;
    try{ localStorage.removeItem(AUTH_FLAG_KEY); }catch(e){ /* 무시 */ }
    updateHeroLoginUI();
    return;
  }
  try{
    ensureTokenClient().requestAccessToken({ prompt: '' });
  }catch(err){
    alert(err.message || String(err));
  }
});

// 이전에 로그인했던 기록이 있으면, 페이지를 열 때 클릭 없이 조용히 재인증을 시도한다.
// (같은 브라우저에 구글 로그인 세션이 남아있는 경우에만 팝업 없이 성공한다.)
function attemptSilentReauth(){
  let hadAuth = false;
  try{ hadAuth = localStorage.getItem(AUTH_FLAG_KEY) === '1'; }catch(e){ /* 무시 */ }
  if(!hadAuth) return;
  const tryInit = () => {
    if(!window.google || !google.accounts || !google.accounts.oauth2){
      setTimeout(tryInit, 300);
      return;
    }
    try{
      ensureTokenClient().requestAccessToken({ prompt: '' });
    }catch(e){ /* 조용히 실패 — 사용자가 직접 로그인 버튼을 누르면 됨 */ }
  };
  tryInit();
}

// 토큰 만료 전에 백그라운드에서 주기적으로 조용히 갱신
setInterval(() => {
  if(isAdmin){
    try{ ensureTokenClient().requestAccessToken({ prompt: '' }); }catch(e){ /* 무시 */ }
  }
}, 50 * 60 * 1000);

attemptSilentReauth();

/* ================= Google Sheets API 헬퍼 (임의의 시트 대상) ================= */

async function sheetsApiGeneric(sheetId, path, options){
  options = options || {};
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}${path}`, {
    ...options,
    headers: {
      'Authorization': `Bearer ${accessToken}`,
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  let data = null;
  try{ data = await res.json(); }catch(e){ /* 응답 본문 없음 */ }
  if(!res.ok){
    const msg = (data && data.error && data.error.message) || `요청 실패 (${res.status})`;
    throw new Error(msg);
  }
  return data;
}

function colLetter(idx){
  let s = '';
  idx = idx + 1;
  while(idx > 0){
    const rem = (idx - 1) % 26;
    s = String.fromCharCode(65 + rem) + s;
    idx = Math.floor((idx - 1) / 26);
  }
  return s;
}

function parseSheetUrl(url){
  const idMatch = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  const gidMatch = url.match(/[?#&]gid=(\d+)/);
  return {
    id: idMatch ? idMatch[1] : null,
    gid: gidMatch ? gidMatch[1] : null,
  };
}

let currentPanelRow = null;
let currentPanelSheetId = null;

let currentGrid = [];

let panelStartRow = 1; // currentGrid[0]이 실제 시트에서 몇 번째 행인지 (저장 시 범위 계산용)

// 대상 시트의 실제 제목행 열 이름 (이 조합이 나오는 첫 행을 제목행으로 판단)
// 실제 시트마다 표기가 조금씩 달라서(예: 구분/분류, 소속/소속기관, 띄어쓰기 유무) 포함 관계로 유연하게 비교한다.
const TARGET_HEADER_LABELS = ['연번', '번호', '이름', '구분', '분류', '소속', '취소요청일', '취소공문', '상태'];

function normalizeHeaderText(s){
  return (s || '').toString().replace(/\s+/g, '').trim();
}

function findHeaderRowIndex(grid){
  for(let i = 0; i < grid.length; i++){
    const row = grid[i] || [];
    const matches = row.filter(cell => {
      const norm = normalizeHeaderText(cell);
      if(!norm) return false;
      return TARGET_HEADER_LABELS.some(label => norm.includes(label) || label.includes(norm));
    }).length;
    if(matches >= 4) return i;
  }
  return 0; // 제목행을 찾지 못하면 원래대로 첫 행부터 표시
}

function trimToHeaderRow(grid){
  const idx = findHeaderRowIndex(grid);
  return { grid: grid.slice(idx), startRow: idx + 1 };
}

async function openSheetPanel(row){
  const parsed = parseSheetUrl(row.link);
  if(!parsed.id){
    window.open(row.link, '_blank', 'noopener');

  currentPanelRow = row;
  currentPanelSheetId = parsed.id;
  currentPanelGid = parsed.gid;
  currentPanelSheetName = null;

  panelDirty = false;
  panelEditable = false;
  panelStartRow = 1;
  panelSearchQuery = '';
  sheetPanelSearchInput.value = '';

  sheetPanelEyebrow.textContent = row.round;
  sheetPanelTitle.textContent = row.subject;
  sheetPanelOpenLink.href = row.link;
  sheetPanelStatus.textContent = '';
  sheetPanelStatus.className = 'sheet-panel-status';
  sheetPanelSaveBtn.style.display = 'none';
  sheetPanelLoginBanner.style.display = 'none';
  sheetPanelBody.innerHTML = `<div class="loading"><div class="spinner"></div>불러오는 중...</div>`;

  sheetPanelOverlay.classList.add('visible');
  document.body.style.overflow = 'hidden';

  if(isAdmin && accessToken){

}

async function loadPanelReadonly(){
  try{
    const table = await fetchArbitrarySheet(currentPanelSheetId, currentPanelGid);
    const cols = table.cols || [];
    const header = cols.map(c => (c.label || '').toString());
    const grid = [header];
    (table.rows || []).forEach(row => {
      const cells = row.c || [];
      grid.push(cells.map(cell => (cell && cell.f != null) ? String(cell.f) : (cell && cell.v != null ? String(cell.v) : '')));
    });
    const trimmed = trimToHeaderRow(grid);
    const finalGrid = trimmed.grid;
    normalizeGrid(finalGrid);
    currentGrid = finalGrid;
    panelStartRow = trimmed.startRow;
    panelEditable = false;
    renderPanelTable();
  }catch(err){
    console.error('시트 미리보기 실패:', err);
    sheetPanelBody.innerHTML = `<div class="error-box">
      이 시트를 불러오지 못했습니다. 비공개 시트이거나 접근 권한이 없을 수 있어요.<br>
      <span style="display:block;margin-top:8px;font-size:13.5px;">상세 오류: ${escapeHtml(err.message || String(err))}</span>
    </div>`;
  }
}

async function loadPanelEditable(){
  sheetPanelBody.innerHTML = `<div class="loading"><div class="spinner"></div>불러오는 중...</div>`;
  sheetPanelLoginBanner.style.display = 'none';
  try{
    const meta = await sheetsApiGeneric(currentPanelSheetId, '?fields=sheets.properties');
    let props = meta.sheets && meta.sheets[0] && meta.sheets[0].properties;
    if(currentPanelGid){
      const found = (meta.sheets || []).find(s => String(s.properties.sheetId) === String(currentPanelGid));
      if(found) props = found.properties;
    }
    if(!props) throw new Error('시트 정보를 찾을 수 없습니다.');
    currentPanelSheetName = props.title;

    const grid = props.gridProperties || {};
    const maxRows = Math.min(grid.rowCount || 200, 300);
    const maxCols = Math.min(grid.columnCount || 20, 26);
    const range = encodeURIComponent(`${currentPanelSheetName}!A1:${colLetter(maxCols - 1)}${maxRows}`);
    const data = await sheetsApiGeneric(currentPanelSheetId, `/values/${range}`);
    const values = data.values || [['']];
    const trimmed = trimToHeaderRow(values);
    const finalGrid = trimmed.grid;
    normalizeGrid(finalGrid);
    const colCount = finalGrid[0] ? finalGrid[0].length : 1;
    finalGrid.push(new Array(colCount).fill('')); // 새 데이터를 바로 입력할 수 있도록 빈 행 1줄을 항상 추가
    currentGrid = finalGrid;
    panelStartRow = trimmed.startRow;
    panelEditable = true;
    panelDirty = false;
    sheetPanelLoginBanner.style.display = 'none';
    sheetPanelSaveBtn.style.display = 'inline-flex';
    renderPanelTable();
  }catch(err){
    console.error('편집용 시트 로드 실패:', err);
    sheetPanelBody.innerHTML = `<div class="error-box">
      이 계정으로는 이 시트를 편집할 수 없습니다. 편집자 권한이 있는지 확인해주세요.<br>
      <span style="display:block;margin-top:8px;font-size:13.5px;">상세 오류: ${escapeHtml(err.message || String(err))}</span>
    </div>`;
  }
}

function normalizeGrid(grid){
  // 완전히 빈 마지막 행들 제거
  while(grid.length > 1 && grid[grid.length - 1].every(c => (c || '').toString().trim() === '')){
    grid.pop();
  }
  const maxCols = Math.max(1, ...grid.map(r => r.length));
  for(let i = 0; i < grid.length; i++){
    while(grid[i].length < maxCols) grid[i].push('');
  }
}

function badgeClassFor(val){
  const trimmedVal = (val || '').toString().trim();
  if(trimmedVal === '선발') return 'badge-selected';
  if(trimmedVal === '취소') return 'badge-cancelled';
  return '';
}

// 한글은 라틴 문자보다 넓게 표시되므로 가중치를 둬서 열 너비를 추정한다.
function estimateTextUnits(str){
  let units = 0;
  for(const ch of (str || '').toString()){
    units += /[\u3131-\uD79D\u1100-\u11FF]/.test(ch) ? 1.8 : 1;
  }
  return units;
}

function computeColWidths(grid){
  const colCount = grid[0] ? grid[0].length : 0;
  const widths = [];
  for(let c = 0; c < colCount; c++){
    let maxUnits = 0;
    for(let r = 0; r < grid.length; r++){
      maxUnits = Math.max(maxUnits, estimateTextUnits(grid[r][c]));
    }
    const px = Math.round(maxUnits * 8.6 + 34);
    widths.push(Math.min(340, Math.max(56, px)));
  }
  return widths;
}

let currentStatusColIdx = -1;

function buildCellHtml(val, r, c, statusColIdx){
  const isStatusCell = c === statusColIdx && r > 0;
  if(panelEditable){
    if(isStatusCell){
      const known = ['', '선발', '취소'];
      const extra = known.includes(val) ? '' : `<option value="${escapeAttr(val)}" selected>${escapeHtml(val)}</option>`;
      return `<td class="status-cell">
        <select data-r="${r}" data-c="${c}" class="status-select ${badgeClassFor(val)}">
          ${extra}
          <option value="" ${val === '' ? 'selected' : ''}>-</option>
          <option value="선발" ${val === '선발' ? 'selected' : ''}>선발</option>
          <option value="취소" ${val === '취소' ? 'selected' : ''}>취소</option>
        </select>
      </td>`;
    }
    return `<td><input type="text" value="${escapeAttr(val)}" data-r="${r}" data-c="${c}"></td>`;
  }
  if(isStatusCell){
    const badgeClass = badgeClassFor(val);
    const content = badgeClass ? `<span class="status-badge ${badgeClass}">${escapeHtml(val)}</span>` : escapeHtml(val);
    return `<td class="readonly-cell status-cell">${content}</td>`;
  }
  return `<td class="readonly-cell">${escapeHtml(val)}</td>`;
}

function buildRowHtml(row, r, statusColIdx){
  const rowClass = r === 0 ? ' class="header-row"' : '';
  return `<tr${rowClass}>${row.map((val, c) => buildCellHtml(val, r, c, statusColIdx)).join('')}</tr>`;
}

function attachRowListeners(container){
  container.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', () => {
      const r = Number(input.getAttribute('data-r'));
      const c = Number(input.getAttribute('data-c'));
      currentGrid[r][c] = input.value;
      markPanelDirty();
      maybeAppendBlankRow(r);
    });
  });
  container.querySelectorAll('select.status-select').forEach(select => {
    select.addEventListener('change', () => {
      const r = Number(select.getAttribute('data-r'));
      const c = Number(select.getAttribute('data-c'));
      currentGrid[r][c] = select.value;
      markPanelDirty();
      select.className = `status-select ${badgeClassFor(select.value)}`.trim();
      maybeAppendBlankRow(r);
    });
  });
}

// 마지막(맨 아래) 빈 행에 값이 입력되기 시작하면, 새로 입력할 수 있는 빈 행을 다시 한 줄 추가한다.
function maybeAppendBlankRow(editedRowIndex){
  if(!panelEditable) return;
  if(editedRowIndex !== currentGrid.length - 1) return;
  const row = currentGrid[editedRowIndex];
  const hasContent = row.some(v => (v || '').toString().trim() !== '');
  if(!hasContent) return;

  const colCount = row.length;
  const newRow = new Array(colCount).fill('');
  currentGrid.push(newRow);
  const newIndex = currentGrid.length - 1;

  const tbody = sheetPanelBody.querySelector('table.sheet-table tbody');
  if(!tbody) return;
  tbody.insertAdjacentHTML('beforeend', buildRowHtml(newRow, newIndex, currentStatusColIdx));
  if(tbody.lastElementChild) attachRowListeners(tbody.lastElementChild);
}

function renderPanelTable(){
  if(currentGrid.length === 0){
    sheetPanelBody.innerHTML = `<div class="empty">표시할 데이터가 없습니다.</div>`;
    return;
  }
  const headerRow = currentGrid[0] || [];
  const statusColIdx = headerRow.findIndex(h => normalizeHeaderText(h) === '상태');
  currentStatusColIdx = statusColIdx;

  const query = panelSearchQuery.trim().toLowerCase();
  const lastIdx = currentGrid.length - 1;
  let visibleIndices;
  if(!query){
    visibleIndices = currentGrid.map((_, r) => r);
  } else {
    visibleIndices = [];
    currentGrid.forEach((row, r) => {
      if(r === 0){ visibleIndices.push(r); return; } // 헤더는 항상 표시
      const matches = row.some(v => (v || '').toString().toLowerCase().includes(query));
      if(matches) visibleIndices.push(r);
    });
    // 새로 입력할 수 있는 마지막 빈 행은 검색 중에도 항상 보이게 유지
    if(panelEditable && lastIdx > 0 && !visibleIndices.includes(lastIdx)){
      visibleIndices.push(lastIdx);
    }
  }

  if(sheetPanelSearchCount){
    const dataRowCount = Math.max(visibleIndices.length - 1, 0);
    sheetPanelSearchCount.textContent = query ? `${dataRowCount}건 검색됨` : '';
  }

  if(visibleIndices.length <= 1){
    sheetPanelBody.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
    return;
  }

  const rowsHtml = visibleIndices.map(r => buildRowHtml(currentGrid[r], r, statusColIdx)).join('');
  const colWidths = computeColWidths(currentGrid);
  const colgroupHtml = '<colgroup>' + colWidths.map(w => `<col style="width:${w}px">`).join('') + '</colgroup>';
  sheetPanelBody.innerHTML = `<table class="sheet-table">${colgroupHtml}<tbody>${rowsHtml}</tbody></table>`;

  if(panelEditable){
    attachRowListeners(sheetPanelBody);
  }
}

sheetPanelSearchInput.addEventListener('input', () => {
  panelSearchQuery = sheetPanelSearchInput.value;
  renderPanelTable();
});

function markPanelDirty(){
  panelDirty = true;
  sheetPanelStatus.textContent = '저장되지 않은 변경사항';
  sheetPanelStatus.className = 'sheet-panel-status dirty';
}

sheetPanelSaveBtn.addEventListener('click', async () => {
  if(!panelEditable || !currentPanelSheetName) return;
  sheetPanelSaveBtn.disabled = true;
  sheetPanelSaveBtn.textContent = '저장 중...';
  try{
    const rows = currentGrid.length;
    const cols = currentGrid[0] ? currentGrid[0].length : 1;
    const endRow = panelStartRow + rows - 1;
    const range = encodeURIComponent(`${currentPanelSheetName}!A${panelStartRow}:${colLetter(cols - 1)}${endRow}`);
    await sheetsApiGeneric(currentPanelSheetId, `/values/${range}?valueInputOption=USER_ENTERED`, {
      method: 'PUT',
      body: JSON.stringify({ values: currentGrid }),
    });
    panelDirty = false;
    const timeStr = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    sheetPanelStatus.textContent = `저장됨 · ${timeStr}`;
    sheetPanelStatus.className = 'sheet-panel-status saved';
  }catch(err){
    console.error('저장 실패:', err);
    alert('저장에 실패했습니다: ' + (err.message || err));
  }finally{
    sheetPanelSaveBtn.disabled = false;
    sheetPanelSaveBtn.textContent = '저장';
  }
});

/* ================= 키보드 단축키 ================= */

document.addEventListener('keydown', (e) => {
  if(sheetPanelOverlay.classList.contains('visible')){
    if(e.key === 'Escape') closeSheetPanel();
    return;
  }
  const tag = document.activeElement && document.activeElement.tagName;
  if(e.key === '/' && document.activeElement !== searchInput && tag !== 'INPUT' && tag !== 'TEXTAREA'){
    e.preventDefault();
    searchInput.focus();
  } else if(e.key === 'Escape' && document.activeElement === searchInput){
    if(searchInput.value){
      searchInput.value = '';
      render();
    } else {
      searchInput.blur();
    }
  }
});

load(false);
setInterval(() => load(false), AUTO_REFRESH_MS);
</script>

</body>
</html>
