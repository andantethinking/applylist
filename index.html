<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차수/과목별 선발자 명단</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
  font-weight: 45 920;
}

:root{
  --ink:#0E1530;
  --ink-soft:#6B7590;
  --paper:#F3F5FA;
  --card:#FFFFFF;
  --line:#E3E7F1;
  --hero-1:#0B1230;
  --hero-2:#1B2557;
  --hero-line:rgba(255,255,255,0.12);
  --white-soft:rgba(255,255,255,0.72);
  --radius:14px;

  /* 차수별 색상 팔레트 (등장 순서대로 순환 배정) */
  --c0-solid:#2F5FE0; --c0-tint:#E9EEFD;
  --c1-solid:#12946B; --c1-tint:#E1F5EC;
  --c2-solid:#C2790E; --c2-tint:#FBF0DD;
  --c3-solid:#DD5B3F; --c3-tint:#FCE8E3;
  --c4-solid:#7B42E0; --c4-tint:#F0E9FE;
  --c5-solid:#0E8E8E; --c5-tint:#DFF4F4;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ---------- HERO ---------- */
.hero{
  position:relative;
  background:linear-gradient(155deg, var(--hero-1) 0%, var(--hero-2) 65%, #24306B 100%);
  overflow:hidden;
  padding:52px 24px 30px;
}
.hero::before{
  content:'';
  position:absolute;
  top:-120px; right:-100px;
  width:420px; height:420px;
  background:radial-gradient(circle, rgba(47,95,224,0.55) 0%, rgba(47,95,224,0) 70%);
  pointer-events:none;
}
.hero::after{
  content:'';
  position:absolute;
  bottom:-160px; left:-80px;
  width:360px; height:360px;
  background:radial-gradient(circle, rgba(18,148,107,0.4) 0%, rgba(18,148,107,0) 70%);
  pointer-events:none;
}
.hero-inner{
  position:relative;
  max-width:1040px;
  margin:0 auto;
}

.eyebrow-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
}
.eyebrow{
  font-size:12.5px;
  font-weight:700;
  letter-spacing:0.12em;
  color:var(--white-soft);
  text-transform:uppercase;
  margin:0;
}
.dot-legend{
  display:flex;
  gap:5px;
}
.dot-legend span{
  width:6px; height:6px; border-radius:50%;
  display:inline-block;
}

h1{
  font-size:clamp(30px,4.6vw,44px);
  font-weight:800;
  letter-spacing:-0.02em;
  margin:0 0 12px;
  background:linear-gradient(100deg, #FFFFFF 20%, #B9C6FF 60%, #8EF0D3 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  line-height:1.15;
}

.sub{
  font-size:15px;
  color:var(--white-soft);
  margin:0 0 30px;
  line-height:1.6;
  max-width:520px;
}

.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:22px;
  flex-wrap:wrap;
}

.search-box{
  position:relative;
  flex:1;
  min-width:220px;
}

.search-box input{
  width:100%;
  padding:13px 16px 13px 40px;
  border:1.5px solid var(--hero-line);
  border-radius:11px;
  font-size:14.5px;
  font-family:inherit;
  background:rgba(255,255,255,0.07);
  color:#fff;
  transition:border-color .15s ease, background .15s ease;
}
.search-box input::placeholder{ color:rgba(255,255,255,0.45); }
.search-box input:focus{
  outline:none;
  border-color:#8EF0D3;
  background:rgba(255,255,255,0.12);
}
.search-box svg{
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  width:16px;
  height:16px;
  stroke:rgba(255,255,255,0.55);
}

.refresh-btn{
  display:flex;
  align-items:center;
  gap:6px;
  padding:12px 15px;
  border:1.5px solid var(--hero-line);
  border-radius:11px;
  background:rgba(255,255,255,0.07);
  color:var(--white-soft);
  font-family:inherit;
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:border-color .15s ease, color .15s ease, background .15s ease;
  white-space:nowrap;
}
.refresh-btn:hover{ border-color:#8EF0D3; color:#fff; background:rgba(255,255,255,0.12); }
.refresh-btn svg{ width:15px; height:15px; stroke:currentColor; transition:transform .5s ease; }
.refresh-btn.spinning svg{ animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ---------- TABS ---------- */
.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  padding-bottom:2px;
}

.tab{
  position:relative;
  padding:9px 16px;
  border-radius:999px;
  border:1.5px solid var(--hero-line);
  background:rgba(255,255,255,0.06);
  color:var(--white-soft);
  font-family:inherit;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
  transition:all .18s ease;
  display:flex;
  align-items:center;
  gap:7px;
}
.tab .swatch{
  width:8px; height:8px; border-radius:50%;
  flex-shrink:0;
}
.tab:hover{ border-color:rgba(255,255,255,0.4); color:#fff; }
.tab.active{
  color:var(--ink);
  border-color:transparent;
  box-shadow:0 6px 16px rgba(0,0,0,0.25);
}
.tab .count{
  opacity:.75;
  font-weight:600;
  margin-left:1px;
}

/* ---------- BODY ---------- */
.wrap{
  max-width:1040px;
  margin:0 auto;
  padding:26px 24px 80px;
}

.status-line{
  font-size:12.5px;
  color:var(--ink-soft);
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:6px;
}
.status-dot{
  width:6px; height:6px; border-radius:50%;
  background:#12946B;
  flex-shrink:0;
}
.status-dot.error{ background:#DD5B3F; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
  gap:14px;
}

.card{
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:24px;
  padding:22px 20px 19px;
  min-height:120px;
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:var(--radius);
  text-decoration:none;
  color:inherit;
  overflow:hidden;
  transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  animation:cardIn .35s ease backwards;
}
.card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:4px;
  background:var(--accent, var(--c0-solid));
}
.card:hover{
  border-color:var(--accent, var(--c0-solid));
  transform:translateY(-3px);
  box-shadow:0 14px 30px rgba(14,21,48,0.12);
}

@keyframes cardIn{
  from{ opacity:0; transform:translateY(8px); }
  to{ opacity:1; transform:translateY(0); }
}
@media (prefers-reduced-motion: reduce){
  .card{ animation:none; }
}

.card-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}

.badge{
  flex-shrink:0;
  font-size:11.5px;
  font-weight:800;
  padding:4px 9px;
  border-radius:6px;
  background:var(--accent-tint, var(--c0-tint));
  color:var(--accent, var(--c0-solid));
  white-space:nowrap;
}

.go-arrow{
  flex-shrink:0;
  width:28px;
  height:28px;
  border-radius:50%;
  background:var(--paper);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .15s ease, transform .15s ease;
}
.card:hover .go-arrow{
  background:var(--accent, var(--c0-solid));
  transform:translate(2px,-2px);
}
.go-arrow svg{ width:13px; height:13px; stroke:var(--ink-soft); transition:stroke .15s ease; }
.card:hover .go-arrow svg{ stroke:#fff; }

.card-title{
  font-size:15.5px;
  font-weight:700;
  color:var(--ink);
  line-height:1.4;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.empty, .loading, .error-box{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
  font-size:14px;
}
.error-box{ color:#DD5B3F; }
.error-box a{ color:#2F5FE0; }

.spinner{
  width:22px; height:22px;
  border:2.5px solid var(--line);
  border-top-color:#2F5FE0;
  border-radius:50%;
  margin:0 auto 12px;
  animation:spin .7s linear infinite;
}

footer{
  margin-top:44px;
  padding-top:20px;
  border-top:1px solid var(--line);
  font-size:12.5px;
  color:var(--ink-soft);
  text-align:center;
}
footer a{ color:#2F5FE0; text-decoration:none; }

@media (max-width:520px){
  .hero{ padding:40px 16px 24px; }
  .wrap{ padding:22px 16px 60px; }
  .card-title{ white-space:normal; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow-row">
      <p class="eyebrow">Course Materials</p>
      <div class="dot-legend" id="dotLegend"></div>
    </div>
    <h1>차수/과목별 선발자 명단</h1>
    <p class="sub">차수별 과목 링크를 한 곳에서 확인하세요. 스프레드시트가 업데이트되면 이 페이지에도 자동으로 반영됩니다.</p>

    <div class="toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="과목명으로 검색">
      </div>
      <button class="refresh-btn" id="refreshBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        새로고침
      </button>
    </div>

    <div class="tabs" id="tabs" style="display:none;"></div>
  </div>
</div>

<div class="wrap">
  <div class="status-line" id="statusLine"></div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>불러오는 중...</div>
  </div>

  <footer>
    자료는 <a href="https://docs.google.com/spreadsheets/d/1hg2PVIp408jOFEdNLEPlE8H9ifUqMNJG1ln4WZQ5NUs/edit?usp=sharing" target="_blank" rel="noopener">Google 스프레드시트</a>에서 자동으로 불러옵니다.
  </footer>
</div>

<script>
const SHEET_ID = '1hg2PVIp408jOFEdNLEPlE8H9ifUqMNJG1ln4WZQ5NUs';
const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5분마다 자동 새로고침

// 차수별 색상 팔레트 (등장 순서대로 순환 배정)
const PALETTE = [
  { solid: '#2F5FE0', tint: '#E9EEFD' },
  { solid: '#12946B', tint: '#E1F5EC' },
  { solid: '#C2790E', tint: '#FBF0DD' },
  { solid: '#DD5B3F', tint: '#FCE8E3' },
  { solid: '#7B42E0', tint: '#F0E9FE' },
  { solid: '#0E8E8E', tint: '#DFF4F4' },
];

let allRows = [];   // [{round, subject, link}]
let rounds = [];    // 차수 목록 (등장 순서)
let roundColor = {}; // round -> {solid, tint}
let activeTab = 'ALL';

const contentEl = document.getElementById('content');
const tabsEl = document.getElementById('tabs');
const statusEl = document.getElementById('statusLine');
const dotLegendEl = document.getElementById('dotLegend');
const searchInput = document.getElementById('searchInput');
const refreshBtn = document.getElementById('refreshBtn');

function naturalKeyForRound(r){
  const m = String(r).match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : Number.POSITIVE_INFINITY;
}

function fetchSheet(){
  return new Promise((resolve, reject) => {
    const callbackName = 'gsheetCb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    const script = document.createElement('script');

    const timeoutId = setTimeout(() => {
      cleanup();
      reject(new Error('요청 시간이 초과되었습니다 (10초). 네트워크 상태를 확인해주세요.'));
    }, 10000);

    function cleanup(){
      clearTimeout(timeoutId);
      delete window[callbackName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(response){
      cleanup();
      if(!response || response.status === 'error'){
        const msg = (response && response.errors && response.errors[0] && response.errors[0].detailed_message)
          || '시트에 접근할 수 없습니다. 공유 설정을 확인해주세요.';
        reject(new Error(msg));
        return;
      }
      resolve(response.table);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('스크립트 로드에 실패했습니다. 시트 ID 또는 네트워크 연결을 확인해주세요.'));
    };

    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${callbackName}&t=${Date.now()}`;
    document.body.appendChild(script);
  });
}

function findColIndex(cols, names){
  for(let i = 0; i < cols.length; i++){
    const label = (cols[i].label || '').trim();
    if(names.includes(label)) return i;
  }
  return -1;
}

function parseTable(table){
  const cols = table.cols || [];
  let roundIdx = findColIndex(cols, ['차수']);
  let subjectIdx = findColIndex(cols, ['과목']);
  let linkIdx = findColIndex(cols, ['링크']);

  if(roundIdx === -1 || subjectIdx === -1 || linkIdx === -1){
    roundIdx = 0; subjectIdx = 1; linkIdx = 2;
  }

  const rows = [];
  (table.rows || []).forEach(row => {
    const cells = row.c || [];
    const round = cells[roundIdx] && cells[roundIdx].v != null ? String(cells[roundIdx].v).trim() : '';
    const subject = cells[subjectIdx] && cells[subjectIdx].v != null ? String(cells[subjectIdx].v).trim() : '';
    let link = cells[linkIdx] && cells[linkIdx].v != null ? String(cells[linkIdx].v).trim() : '';
    if(!round || !subject || !link) return;
    if(!/^https?:\/\//i.test(link)) link = 'https://' + link;
    rows.push({ round, subject, link });
  });
  return rows;
}

function assignColors(){
  roundColor = {};
  rounds.forEach((r, i) => {
    roundColor[r] = PALETTE[i % PALETTE.length];
  });
}

function render(){
  const seen = new Set();
  rounds = [];
  allRows.forEach(r => { if(!seen.has(r.round)){ seen.add(r.round); rounds.push(r.round); } });
  rounds.sort((a,b) => naturalKeyForRound(a) - naturalKeyForRound(b));
  assignColors();

  const query = searchInput.value.trim().toLowerCase();
  const searching = query.length > 0;

  // 상단 컬러 레전드 점
  dotLegendEl.innerHTML = rounds.map(r => `<span style="background:${roundColor[r].solid}"></span>`).join('');

  if(rounds.length > 0){
    tabsEl.style.display = 'flex';
    const tabHtml = ['ALL', ...rounds].map(r => {
      const label = r === 'ALL' ? '전체' : r;
      const count = r === 'ALL' ? allRows.length : allRows.filter(x => x.round === r).length;
      const isActive = !searching && activeTab === r;
      const color = r === 'ALL' ? '#FFFFFF' : roundColor[r].solid;
      const style = isActive ? `background:${color};` : '';
      const swatch = r === 'ALL'
        ? `<span class="swatch" style="background:linear-gradient(135deg, #2F5FE0, #8EF0D3)"></span>`
        : `<span class="swatch" style="background:${roundColor[r].solid}"></span>`;
      return `<button class="tab ${isActive ? 'active' : ''}" style="${style}" data-round="${escapeAttr(r)}">${swatch}${escapeHtml(label)} <span class="count">${count}</span></button>`;
    }).join('');
    tabsEl.innerHTML = tabHtml;
    tabsEl.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.getAttribute('data-round');
        searchInput.value = '';
        render();
      });
    });
  } else {
    tabsEl.style.display = 'none';
  }

  let rowsToShow;
  if(searching){
    rowsToShow = allRows.filter(r => r.subject.toLowerCase().includes(query));
  } else if(activeTab === 'ALL'){
    rowsToShow = allRows;
  } else {
    rowsToShow = allRows.filter(r => r.round === activeTab);
  }

  if(rowsToShow.length === 0){
    contentEl.innerHTML = `<div class="empty">${searching ? '검색 결과가 없습니다.' : '표시할 과목이 없습니다.'}</div>`;
    return;
  }

  const showBadge = searching || activeTab === 'ALL';
  contentEl.innerHTML = `<div class="grid">` + rowsToShow.map((r, i) => {
    const c = roundColor[r.round] || PALETTE[0];
    return `
    <a class="card" style="--accent:${c.solid};--accent-tint:${c.tint};animation-delay:${Math.min(i * 30, 240)}ms" href="${escapeAttr(r.link)}" target="_blank" rel="noopener">
      <div class="card-top">
        ${showBadge ? `<span class="badge">${escapeHtml(r.round)}</span>` : `<span></span>`}
        <span class="go-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
        </span>
      </div>
      <span class="card-title">${escapeHtml(r.subject)}</span>
    </a>
  `;
  }).join('') + `</div>`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

function setStatus(ok, message){
  statusEl.innerHTML = `<span class="status-dot ${ok ? '' : 'error'}"></span>${message}`;
}

async function load(isManual){
  if(isManual) refreshBtn.classList.add('spinning');
  try{
    const table = await fetchSheet();
    allRows = parseTable(table);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    setStatus(true, `마지막 업데이트: ${timeStr} · 총 ${allRows.length}개 과목`);
    render();
  }catch(err){
    console.error('시트 로드 실패:', err);
    setStatus(false, '데이터를 불러오지 못했습니다.');
    contentEl.innerHTML = `<div class="error-box">
      스프레드시트를 불러오지 못했습니다.<br>
      시트가 <strong>"링크가 있는 모든 사용자에게 공개(뷰어)"</strong>로 공유되어 있는지, 시트 ID가 올바른지 확인해주세요.<br>
      <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?usp=sharing" target="_blank" rel="noopener">스프레드시트 열기</a><br>
      <span style="display:block;margin-top:10px;font-size:11.5px;color:var(--ink-soft);">상세 오류: ${escapeHtml(err.message || String(err))}</span>
    </div>`;
  }finally{
    if(isManual) setTimeout(() => refreshBtn.classList.remove('spinning'), 400);
  }
}

searchInput.addEventListener('input', render);
refreshBtn.addEventListener('click', () => load(true));

load(false);
setInterval(() => load(false), AUTO_REFRESH_MS);
</script>

</body>
</html>
