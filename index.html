<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과목 자료 모음</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
  font-weight: 45 920;
}

:root{
  --blue-900:#12275B;
  --blue-700:#1D4ED8;
  --blue-500:#3B6EF0;
  --blue-100:#E8EEFC;
  --emerald:#0F9D74;
  --amber:#D98F1E;
  --coral:#E0654F;
  --ink:#16203D;
  --ink-soft:#5B6787;
  --paper:#F6F8FC;
  --card:#FFFFFF;
  --line:#E2E7F3;
  --radius:14px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

.wrap{
  max-width:960px;
  margin:0 auto;
  padding:48px 24px 80px;
}

header.hero{
  margin-bottom:36px;
}

.eyebrow{
  font-size:13px;
  font-weight:600;
  letter-spacing:0.08em;
  color:var(--blue-700);
  text-transform:uppercase;
  margin:0 0 10px;
}

h1{
  font-size:clamp(28px,4.2vw,40px);
  font-weight:800;
  letter-spacing:-0.02em;
  margin:0 0 10px;
  background:linear-gradient(100deg, var(--blue-900) 15%, var(--blue-500) 55%, var(--emerald) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  line-height:1.15;
}

.sub{
  font-size:15px;
  color:var(--ink-soft);
  margin:0;
  line-height:1.6;
}

.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
  margin:28px 0 20px;
  flex-wrap:wrap;
}

.search-box{
  position:relative;
  flex:1;
  min-width:220px;
}

.search-box input{
  width:100%;
  padding:12px 16px 12px 40px;
  border:1.5px solid var(--line);
  border-radius:10px;
  font-size:14.5px;
  font-family:inherit;
  background:var(--card);
  color:var(--ink);
  transition:border-color .15s ease, box-shadow .15s ease;
}
.search-box input:focus{
  outline:none;
  border-color:var(--blue-500);
  box-shadow:0 0 0 3px var(--blue-100);
}
.search-box svg{
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  width:16px;
  height:16px;
  stroke:var(--ink-soft);
}

.refresh-btn{
  display:flex;
  align-items:center;
  gap:6px;
  padding:11px 14px;
  border:1.5px solid var(--line);
  border-radius:10px;
  background:var(--card);
  color:var(--ink-soft);
  font-family:inherit;
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:border-color .15s ease, color .15s ease;
  white-space:nowrap;
}
.refresh-btn:hover{ border-color:var(--blue-500); color:var(--blue-700); }
.refresh-btn svg{ width:15px; height:15px; stroke:currentColor; transition:transform .5s ease; }
.refresh-btn.spinning svg{ animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:24px;
}

.tab{
  padding:9px 16px;
  border-radius:999px;
  border:1.5px solid var(--line);
  background:var(--card);
  color:var(--ink-soft);
  font-family:inherit;
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:all .15s ease;
}
.tab:hover{ border-color:var(--blue-500); color:var(--blue-700); }
.tab.active{
  background:var(--blue-700);
  border-color:var(--blue-700);
  color:#fff;
}
.tab .count{
  opacity:.7;
  font-weight:500;
  margin-left:3px;
}

.status-line{
  font-size:12.5px;
  color:var(--ink-soft);
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:6px;
}
.status-dot{
  width:6px; height:6px; border-radius:50%;
  background:var(--emerald);
  flex-shrink:0;
}
.status-dot.error{ background:var(--coral); }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
  gap:12px;
}

.card{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:22px;
  padding:20px 20px 18px;
  min-height:118px;
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:var(--radius);
  text-decoration:none;
  color:inherit;
  transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
}
.card:hover{
  border-color:var(--blue-500);
  transform:translateY(-2px);
  box-shadow:0 10px 24px rgba(29,78,216,0.10);
}

.card-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}

.badge{
  flex-shrink:0;
  font-size:11.5px;
  font-weight:700;
  padding:4px 9px;
  border-radius:6px;
  background:var(--blue-100);
  color:var(--blue-700);
  white-space:nowrap;
}

.go-arrow{
  flex-shrink:0;
  width:28px;
  height:28px;
  border-radius:50%;
  background:var(--paper);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .15s ease, transform .15s ease;
}
.card:hover .go-arrow{
  background:var(--blue-700);
  transform:translate(2px,-2px);
}
.go-arrow svg{ width:13px; height:13px; stroke:var(--ink-soft); transition:stroke .15s ease; }
.card:hover .go-arrow svg{ stroke:#fff; }

.card-title{
  font-size:15.5px;
  font-weight:700;
  color:var(--ink);
  line-height:1.4;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.empty, .loading, .error-box{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
  font-size:14px;
}
.error-box{ color:var(--coral); }
.error-box a{ color:var(--blue-700); }

.spinner{
  width:22px; height:22px;
  border:2.5px solid var(--line);
  border-top-color:var(--blue-700);
  border-radius:50%;
  margin:0 auto 12px;
  animation:spin .7s linear infinite;
}

footer{
  margin-top:48px;
  padding-top:20px;
  border-top:1px solid var(--line);
  font-size:12.5px;
  color:var(--ink-soft);
  text-align:center;
}
footer a{ color:var(--blue-700); text-decoration:none; }

@media (max-width:520px){
  .wrap{ padding:32px 16px 60px; }
  .card-title{ white-space:normal; }
}
</style>
</head>
<body>

<div class="wrap">
  <header class="hero">
    <p class="eyebrow">Course Materials</p>
    <h1>과목 자료 모음</h1>
    <p class="sub">차수별 과목 링크를 한 곳에서 확인하세요. 스프레드시트가 업데이트되면 이 페이지에도 자동으로 반영됩니다.</p>
  </header>

  <div class="toolbar">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="과목명으로 검색">
    </div>
    <button class="refresh-btn" id="refreshBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      새로고침
    </button>
  </div>

  <div class="tabs" id="tabs" style="display:none;"></div>
  <div class="status-line" id="statusLine"></div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>불러오는 중...</div>
  </div>

  <footer>
    자료는 <a href="https://docs.google.com/spreadsheets/d/1hg2PVIp408jOFEdNLEPlE8H9ifUqMNJG1ln4WZQ5NUs/edit?usp=sharing" target="_blank" rel="noopener">Google 스프레드시트</a>에서 자동으로 불러옵니다.
  </footer>
</div>

<script>
const SHEET_ID = '1hg2PVIp408jOFEdNLEPlE8H9ifUqMNJG1ln4WZQ5NUs';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5분마다 자동 새로고침

let allRows = [];   // [{round, subject, link}]
let rounds = [];    // 차수 목록 (등장 순서)
let activeTab = 'ALL';

const contentEl = document.getElementById('content');
const tabsEl = document.getElementById('tabs');
const statusEl = document.getElementById('statusLine');
const searchInput = document.getElementById('searchInput');
const refreshBtn = document.getElementById('refreshBtn');

function naturalKeyForRound(r){
  // "1차", "2차" 처럼 숫자가 포함되어 있으면 숫자 기준 정렬, 아니면 문자열 기준
  const m = String(r).match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : Number.POSITIVE_INFINITY;
}

async function fetchSheet(){
  const res = await fetch(SHEET_URL + '&t=' + Date.now(), { cache: 'no-store' });
  if(!res.ok) throw new Error('네트워크 오류 (' + res.status + ')');
  const text = await res.text();
  const jsonStart = text.indexOf('{');
  const jsonEnd = text.lastIndexOf('}');
  if(jsonStart === -1 || jsonEnd === -1) throw new Error('시트 응답을 해석할 수 없습니다');
  const data = JSON.parse(text.slice(jsonStart, jsonEnd + 1));
  return data.table;
}

function findColIndex(cols, names){
  for(let i = 0; i < cols.length; i++){
    const label = (cols[i].label || '').trim();
    if(names.includes(label)) return i;
  }
  return -1;
}

function parseTable(table){
  const cols = table.cols || [];
  let roundIdx = findColIndex(cols, ['차수']);
  let subjectIdx = findColIndex(cols, ['과목']);
  let linkIdx = findColIndex(cols, ['링크']);

  // 헤더 이름이 정확히 매칭되지 않으면 앞 3개 열을 순서대로 사용
  if(roundIdx === -1 || subjectIdx === -1 || linkIdx === -1){
    roundIdx = 0; subjectIdx = 1; linkIdx = 2;
  }

  const rows = [];
  (table.rows || []).forEach(row => {
    const cells = row.c || [];
    const round = cells[roundIdx] && cells[roundIdx].v != null ? String(cells[roundIdx].v).trim() : '';
    const subject = cells[subjectIdx] && cells[subjectIdx].v != null ? String(cells[subjectIdx].v).trim() : '';
    let link = cells[linkIdx] && cells[linkIdx].v != null ? String(cells[linkIdx].v).trim() : '';
    if(!round || !subject || !link) return;
    if(!/^https?:\/\//i.test(link)) link = 'https://' + link;
    rows.push({ round, subject, link });
  });
  return rows;
}

function render(){
  // 탭 목록 구성
  const seen = new Set();
  rounds = [];
  allRows.forEach(r => { if(!seen.has(r.round)){ seen.add(r.round); rounds.push(r.round); } });
  rounds.sort((a,b) => naturalKeyForRound(a) - naturalKeyForRound(b));

  const query = searchInput.value.trim().toLowerCase();
  const searching = query.length > 0;

  // 탭 UI
  if(rounds.length > 0){
    tabsEl.style.display = 'flex';
    const tabHtml = ['ALL', ...rounds].map(r => {
      const label = r === 'ALL' ? '전체' : r;
      const count = r === 'ALL' ? allRows.length : allRows.filter(x => x.round === r).length;
      const isActive = !searching && activeTab === r;
      return `<button class="tab ${isActive ? 'active' : ''}" data-round="${escapeAttr(r)}">${escapeHtml(label)} <span class="count">${count}</span></button>`;
    }).join('');
    tabsEl.innerHTML = tabHtml;
    tabsEl.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.getAttribute('data-round');
        searchInput.value = '';
        render();
      });
    });
  } else {
    tabsEl.style.display = 'none';
  }

  // 목록 필터링
  let rowsToShow;
  if(searching){
    rowsToShow = allRows.filter(r => r.subject.toLowerCase().includes(query));
  } else if(activeTab === 'ALL'){
    rowsToShow = allRows;
  } else {
    rowsToShow = allRows.filter(r => r.round === activeTab);
  }

  if(rowsToShow.length === 0){
    contentEl.innerHTML = `<div class="empty">${searching ? '검색 결과가 없습니다.' : '표시할 과목이 없습니다.'}</div>`;
    return;
  }

  const showBadge = searching || activeTab === 'ALL';
  contentEl.innerHTML = `<div class="grid">` + rowsToShow.map(r => `
    <a class="card" href="${escapeAttr(r.link)}" target="_blank" rel="noopener">
      <div class="card-top">
        ${showBadge ? `<span class="badge">${escapeHtml(r.round)}</span>` : `<span></span>`}
        <span class="go-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
        </span>
      </div>
      <span class="card-title">${escapeHtml(r.subject)}</span>
    </a>
  `).join('') + `</div>`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

function setStatus(ok, message){
  statusEl.innerHTML = `<span class="status-dot ${ok ? '' : 'error'}"></span>${message}`;
}

async function load(isManual){
  if(isManual) refreshBtn.classList.add('spinning');
  try{
    const table = await fetchSheet();
    allRows = parseTable(table);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    setStatus(true, `마지막 업데이트: ${timeStr} · 총 ${allRows.length}개 과목`);
    render();
  }catch(err){
    setStatus(false, '데이터를 불러오지 못했습니다.');
    contentEl.innerHTML = `<div class="error-box">
      스프레드시트를 불러오지 못했습니다.<br>
      시트가 <strong>"링크가 있는 모든 사용자에게 공개(뷰어)"</strong>로 공유되어 있는지 확인해주세요.<br>
      <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?usp=sharing" target="_blank" rel="noopener">스프레드시트 열기</a>
    </div>`;
  }finally{
    if(isManual) setTimeout(() => refreshBtn.classList.remove('spinning'), 400);
  }
}

searchInput.addEventListener('input', render);
refreshBtn.addEventListener('click', () => load(true));

load(false);
setInterval(() => load(false), AUTO_REFRESH_MS);
</script>

</body>
</html>
