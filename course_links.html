<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차수/과목별 선발자 명단</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
  font-weight: 45 920;
}

:root{
  --ink:#0E1530;
  --ink-soft:#6B7590;
  --paper:#F3F5FA;
  --card:#FFFFFF;
  --line:#E3E7F1;
  --hero-1:#0B1230;
  --hero-2:#1B2557;
  --hero-line:rgba(255,255,255,0.12);
  --white-soft:rgba(255,255,255,0.72);
  --radius:14px;

  /* 차수별 색상 팔레트 (등장 순서대로 순환 배정) */
  --c0-solid:#2F5FE0; --c0-tint:#E9EEFD;
  --c1-solid:#12946B; --c1-tint:#E1F5EC;
  --c2-solid:#C2790E; --c2-tint:#FBF0DD;
  --c3-solid:#DD5B3F; --c3-tint:#FCE8E3;
  --c4-solid:#7B42E0; --c4-tint:#F0E9FE;
  --c5-solid:#0E8E8E; --c5-tint:#DFF4F4;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{ scroll-behavior:smooth; }
body{
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a:focus-visible, button:focus-visible, input:focus-visible{
  outline:2px solid #8EF0D3;
  outline-offset:2px;
  border-radius:8px;
}

/* ---------- HERO ---------- */
.hero{
  position:relative;
  background:linear-gradient(155deg, var(--hero-1) 0%, var(--hero-2) 65%, #24306B 100%);
  overflow:hidden;
  padding:52px 24px 26px;
}
.hero::before{
  content:'';
  position:absolute;
  top:-120px; right:-100px;
  width:420px; height:420px;
  background:radial-gradient(circle, rgba(47,95,224,0.55) 0%, rgba(47,95,224,0) 70%);
  pointer-events:none;
}
.hero::after{
  content:'';
  position:absolute;
  bottom:-160px; left:-80px;
  width:360px; height:360px;
  background:radial-gradient(circle, rgba(18,148,107,0.4) 0%, rgba(18,148,107,0) 70%);
  pointer-events:none;
}
.hero-inner{
  position:relative;
  max-width:1040px;
  margin:0 auto;
}

/* ---------- STICKY CONTROL BAR (search + tabs) ---------- */
.control-bar{
  position:sticky;
  top:0;
  z-index:40;
  background:linear-gradient(155deg, var(--hero-2) 0%, #24306B 100%);
  padding:16px 24px;
  box-shadow:0 12px 26px rgba(9,13,33,0.2);
}
.control-inner{
  max-width:1040px;
  margin:0 auto;
}

.dot-legend{
  display:flex;
  gap:5px;
  margin-bottom:16px;
}
.dot-legend span{
  width:6px; height:6px; border-radius:50%;
  display:inline-block;
}

h1{
  font-size:clamp(35px,5.4vw,51px);
  font-weight:800;
  letter-spacing:-0.02em;
  margin:0 0 12px;
  line-height:1.32;
  cursor:pointer;
  background:linear-gradient(100deg, #FFFFFF 20%, #B9C6FF 60%, #8EF0D3 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.title-year{
  display:block;
  font-size:0.5em;
  font-weight:700;
  letter-spacing:0.1em;
  margin-bottom:6px;
  color:#4FA3FF;
}

.title-amp{
  font-size:0.62em;
  font-weight:700;
  vertical-align:middle;
  color:#FFFFFF;
  opacity:0.85;
}

.title-ai{
  color:var(--hero-1);
  font-weight:900;
  -webkit-text-stroke:1.3px #fff;
  text-shadow:
    -1px -1px 0 #fff, 1px -1px 0 #fff,
    -1px  1px 0 #fff, 1px  1px 0 #fff,
     0   -1.4px 0 #fff, 0    1.4px 0 #fff,
    -1.4px 0    0 #fff, 1.4px 0    0 #fff;
}

.sub{
  font-size:14px;
  color:var(--white-soft);
  margin:0 0 30px;
  line-height:1.6;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}

.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:22px;
  flex-wrap:wrap;
}

.search-box{
  position:relative;
  flex:1;
  min-width:220px;
}

.search-box input{
  width:100%;
  padding:13px 40px 13px 40px;
  border:1.5px solid var(--hero-line);
  border-radius:11px;
  font-size:14.5px;
  font-family:inherit;
  background:rgba(255,255,255,0.07);
  color:#fff;
  transition:border-color .15s ease, background .15s ease;
}
.search-box input::placeholder{ color:rgba(255,255,255,0.45); }
.search-box input:focus{
  outline:none;
  border-color:#8EF0D3;
  background:rgba(255,255,255,0.12);
}
.search-box svg{
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  width:16px;
  height:16px;
  stroke:rgba(255,255,255,0.55);
}
.search-clear{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  width:24px;
  height:24px;
  padding:0;
  margin:0;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  display:none;
  align-items:center;
  justify-content:center;
  line-height:0;
  cursor:pointer;
  transition:background .15s ease;
}
.search-clear.visible{ display:flex; }
.search-clear:hover{ background:rgba(255,255,255,0.22); }
.search-clear svg{
  display:block;
  width:12px; height:12px;
  stroke:rgba(255,255,255,0.85);
  pointer-events:none;
}

.search-hint{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:11px;
  font-weight:700;
  font-family:inherit;
  color:rgba(255,255,255,0.45);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:5px;
  padding:2px 6px;
  pointer-events:none;
  transition:opacity .15s ease;
}
.search-hint.hidden{ opacity:0; }

.refresh-btn{
  display:flex;
  align-items:center;
  gap:6px;
  padding:12px 15px;
  border:1.5px solid var(--hero-line);
  border-radius:11px;
  background:rgba(255,255,255,0.07);
  color:var(--white-soft);
  font-family:inherit;
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:border-color .15s ease, color .15s ease, background .15s ease;
  white-space:nowrap;
}
.refresh-btn:hover{ border-color:#8EF0D3; color:#fff; background:rgba(255,255,255,0.12); }
.refresh-btn svg{ width:15px; height:15px; stroke:currentColor; transition:transform .5s ease; }
.refresh-btn.spinning svg{ animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

.admin-btn{
  display:flex;
  align-items:center;
  gap:6px;
  padding:12px 15px;
  border:1.5px solid var(--hero-line);
  border-radius:11px;
  background:rgba(255,255,255,0.07);
  color:var(--white-soft);
  font-family:inherit;
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:border-color .15s ease, color .15s ease, background .15s ease;
  white-space:nowrap;
}
.admin-btn:hover{ border-color:#8EF0D3; color:#fff; background:rgba(255,255,255,0.12); }
.admin-btn svg{ width:15px; height:15px; stroke:currentColor; }
.admin-btn.is-on{
  border-color:#8EF0D3;
  background:rgba(142,240,211,0.14);
  color:#fff;
}

.admin-add-btn{
  display:none;
  align-items:center;
  gap:6px;
  padding:12px 16px;
  border:1.5px solid transparent;
  border-radius:11px;
  background:linear-gradient(100deg, #4FA3FF, #8EF0D3);
  color:#0B1230;
  font-family:inherit;
  font-size:13.5px;
  font-weight:800;
  cursor:pointer;
  white-space:nowrap;
  transition:transform .15s ease, box-shadow .15s ease;
}
.admin-add-btn.visible{ display:flex; }
.admin-add-btn:hover{ transform:translateY(-1px); box-shadow:0 8px 18px rgba(79,163,255,0.35); }
.admin-add-btn svg{ width:15px; height:15px; stroke:#0B1230; }

.admin-status-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:11.5px;
  font-weight:800;
  padding:3px 9px;
  border-radius:999px;
  background:#E1F5EC;
  color:#12946B;
  margin-left:8px;
}

/* ---------- BACK BUTTON ---------- */
.back-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 4px;
  margin-bottom:14px;
  border:none;
  background:none;
  color:var(--white-soft);
  font-family:inherit;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
  transition:color .15s ease;
}
.back-btn:hover{ color:#fff; }
.back-btn svg{ width:15px; height:15px; stroke:currentColor; }

/* ---------- TABS ---------- */
.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  padding-bottom:2px;
}

.tab{
  position:relative;
  padding:9px 16px;
  border-radius:999px;
  border:1.5px solid var(--hero-line);
  background:rgba(255,255,255,0.06);
  color:var(--white-soft);
  font-family:inherit;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
  transition:all .18s ease;
  display:flex;
  align-items:center;
  gap:7px;
}
.tab .swatch{
  width:8px; height:8px; border-radius:50%;
  flex-shrink:0;
}
.tab:hover{ border-color:rgba(255,255,255,0.4); color:#fff; }
.tab.active{
  color:var(--ink);
  border-color:transparent;
  box-shadow:0 6px 16px rgba(0,0,0,0.25);
}
.tab .count{
  opacity:.75;
  font-weight:600;
  margin-left:1px;
}

/* ---------- BODY ---------- */
.wrap{
  max-width:1040px;
  margin:0 auto;
  padding:26px 24px 80px;
}

.status-line{
  font-size:12.5px;
  color:var(--ink-soft);
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:6px;
}
.status-dot{
  width:6px; height:6px; border-radius:50%;
  background:#12946B;
  flex-shrink:0;
}
.status-dot.error{ background:#DD5B3F; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
  gap:14px;
}

.card{
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:20px;
  padding:22px 20px 19px;
  min-height:158px;
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:var(--radius);
  text-decoration:none;
  color:inherit;
  overflow:hidden;
  transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  animation:cardIn .35s ease backwards;
}
.card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:4px;
  background:var(--accent, var(--c0-solid));
}
.card:hover{
  border-color:var(--accent, var(--c0-solid));
  transform:translateY(-3px);
  box-shadow:0 14px 30px rgba(14,21,48,0.12);
}

@keyframes cardIn{
  from{ opacity:0; transform:translateY(8px); }
  to{ opacity:1; transform:translateY(0); }
}
@media (prefers-reduced-motion: reduce){
  .card{ animation:none; }
}

.badge{
  flex-shrink:0;
  font-size:11.5px;
  font-weight:800;
  padding:4px 9px;
  border-radius:6px;
  background:var(--accent-tint, var(--c0-tint));
  color:var(--accent, var(--c0-solid));
  white-space:nowrap;
}

.go-arrow{
  flex-shrink:0;
  width:28px;
  height:28px;
  border-radius:50%;
  background:var(--paper);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .15s ease, transform .15s ease;
}
.card:hover .go-arrow{
  background:var(--accent, var(--c0-solid));
  transform:translate(2px,-2px);
}
.go-arrow svg{ width:13px; height:13px; stroke:var(--ink-soft); transition:stroke .15s ease; }
.card:hover .go-arrow svg{ stroke:#fff; }

.card-body{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card-meta{
  display:flex;
  flex-direction:column;
  gap:5px;
}
.meta-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12.5px;
  font-weight:600;
  color:var(--ink-soft);
}
.meta-item svg{
  width:13px; height:13px;
  stroke:var(--ink-soft);
  flex-shrink:0;
}

.card-title{
  font-size:18px;
  font-weight:800;
  letter-spacing:-0.01em;
  color:var(--ink);
  line-height:1.35;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.card-bottom{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.card.admin-card{ padding-top:48px; cursor:default; }

.admin-tools{
  position:absolute;
  top:12px;
  right:12px;
  display:flex;
  gap:6px;
  z-index:2;
}
.icon-btn{
  width:28px;
  height:28px;
  padding:0;
  margin:0;
  border:none;
  border-radius:50%;
  background:var(--paper);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:background .15s ease;
}
.icon-btn svg{ width:13px; height:13px; stroke:var(--ink-soft); pointer-events:none; }
.icon-btn:hover{ background:var(--line); }
.icon-btn.danger:hover{ background:#FCE8E3; }
.icon-btn.danger:hover svg{ stroke:#DD5B3F; }

.round-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
  gap:16px;
}

.round-card{
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:26px;
  padding:24px 22px 20px;
  min-height:128px;
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:var(--radius);
  cursor:pointer;
  text-align:left;
  font-family:inherit;
  overflow:hidden;
  transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  animation:cardIn .35s ease backwards;
}
.round-card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:5px;
  background:var(--accent, var(--c0-solid));
}
.round-card:hover{
  border-color:var(--accent, var(--c0-solid));
  transform:translateY(-3px);
  box-shadow:0 14px 30px rgba(14,21,48,0.12);
}
.round-card-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}
.round-eyebrow{
  font-size:11.5px;
  font-weight:800;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--accent, var(--c0-solid));
}
.round-name{
  font-size:19px;
  font-weight:800;
  color:var(--ink);
  line-height:1.35;
}
.round-count{
  font-size:12.5px;
  font-weight:700;
  color:var(--ink-soft);
}

.empty, .loading, .error-box{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
  font-size:14px;
}
.error-box{ color:#DD5B3F; }
.error-box a{ color:#2F5FE0; }

.spinner{
  width:22px; height:22px;
  border:2.5px solid var(--line);
  border-top-color:#2F5FE0;
  border-radius:50%;
  margin:0 auto 12px;
  animation:spin .7s linear infinite;
}

/* ---------- ADMIN EDIT MODAL ---------- */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:100;
  background:rgba(10,15,36,0.55);
  backdrop-filter:blur(2px);
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal-overlay.visible{ display:flex; }

.modal-box{
  width:100%;
  max-width:440px;
  background:var(--card);
  border-radius:16px;
  padding:26px 24px 22px;
  box-shadow:0 24px 60px rgba(9,13,33,0.35);
  animation:cardIn .25s ease;
}

.modal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}
.modal-header h2{
  font-size:17px;
  font-weight:800;
  color:var(--ink);
  margin:0;
}
.modal-close{
  width:26px; height:26px;
  padding:0; margin:0;
  border:none; border-radius:50%;
  background:var(--paper);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.modal-close svg{ width:12px; height:12px; stroke:var(--ink-soft); }
.modal-close:hover{ background:var(--line); }

.modal-body{
  display:flex;
  flex-direction:column;
  gap:13px;
}
.modal-body label{
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:12.5px;
  font-weight:700;
  color:var(--ink-soft);
}
.modal-body input{
  padding:11px 13px;
  border:1.5px solid var(--line);
  border-radius:9px;
  font-size:14px;
  font-family:inherit;
  color:var(--ink);
  background:var(--paper);
  transition:border-color .15s ease;
}
.modal-body input:focus{
  outline:none;
  border-color:#2F5FE0;
  background:#fff;
}

.modal-error{
  margin:12px 0 0;
  font-size:12.5px;
  font-weight:700;
  color:#DD5B3F;
}

.modal-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-top:20px;
}
.modal-footer-right{ display:flex; gap:8px; }
.modal-btn{
  padding:10px 16px;
  border-radius:9px;
  border:1.5px solid transparent;
  font-family:inherit;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
  transition:opacity .15s ease, transform .15s ease;
}
.modal-btn:hover{ transform:translateY(-1px); }
.modal-btn.ghost{
  background:var(--paper);
  border-color:var(--line);
  color:var(--ink-soft);
}
.modal-btn.primary{
  background:#2F5FE0;
  color:#fff;
}
.modal-btn.danger{
  background:#FCE8E3;
  color:#DD5B3F;
}
.modal-btn:disabled{ opacity:0.55; cursor:default; transform:none; }

footer{
  margin-top:44px;
  padding-top:20px;
  border-top:1px solid var(--line);
  font-size:12.5px;
  color:var(--ink-soft);
  text-align:center;
}
footer a{ color:#2F5FE0; text-decoration:none; }

@media (max-width:520px){
  .hero{ padding:40px 16px 22px; }
  .control-bar{ padding:12px 16px; }
  .wrap{ padding:22px 16px 60px; }
  .card-title{ white-space:normal; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="dot-legend" id="dotLegend"></div>
    <h1 id="titleHeading">
      <span class="title-year">2026</span>
      공공 <span class="title-ai">AI</span> 역량트랙 <span class="title-amp">&amp;</span><br>
      <span class="title-ai">AI</span> 챔피언 종합과정
    </h1>
    <p class="sub">스프레드시트가 업데이트되면 이 페이지에도 자동으로 반영됩니다.</p>
  </div>
</div>

<div class="control-bar">
  <div class="control-inner">
    <div class="toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="과목명으로 검색">
        <span class="search-hint" id="searchHint">/</span>
        <button class="search-clear" id="searchClear" type="button" aria-label="검색어 지우기">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <button class="refresh-btn" id="refreshBtn">

/* ---------- Google 로그인 (관리자 편집 모드) ---------- */

function ensureTokenClient(){
  if(tokenClient) return tokenClient;
  if(!window.google || !google.accounts || !google.accounts.oauth2){
    throw new Error('Google 로그인 스크립트를 아직 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SHEETS_SCOPE,
    callback: async (tokenResponse) => {
      if(tokenResponse && tokenResponse.access_token){
        accessToken = tokenResponse.access_token;
        adminLoginBtn.disabled = true;
        try{
          await loadSheetMeta();
          await loadHeaderMap();
          isAdmin = true;
          updateAdminUI();
          await loadAdminData();
        }catch(err){
          console.error('관리자 모드 진입 실패:', err);
          alert('로그인은 되었지만 시트 정보를 불러오지 못했습니다.\n' + (err.message || err));
          accessToken = null;
        }finally{
          adminLoginBtn.disabled = false;
        }
      }
    },
  });
  return tokenClient;
}

function updateAdminUI(){
  adminLoginBtn.classList.toggle('is-on', isAdmin);
  adminLoginBtn.innerHTML = isAdmin
    ? `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8L22 12L18 16"/><path d="M2 12H22"/></svg>로그아웃`
    : `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>관리자 로그인`;

}

adminLoginBtn.addEventListener('click', () => {

    isAdmin = false;
    activeSheetName = null;
    activeSheetId = null;

  }
});

/* ---------- Google Sheets API 헬퍼 ---------- */

async function sheetsApi(path, options){
  options = options || {};
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}${path}`, {
    ...options,
    headers: {
      'Authorization': `Bearer ${accessToken}`,
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  let data = null;
  try{ data = await res.json(); }catch(e){ /* 응답 본문 없음 */ }
  if(!res.ok){
    const msg = (data && data.error && data.error.message) || `요청 실패 (${res.status})`;
    throw new Error(msg);
  }
  return data;
}

async function loadSheetMeta(){
  const data = await sheetsApi('?fields=sheets.properties');
  const first = data.sheets && data.sheets[0] && data.sheets[0].properties;
  if(!first) throw new Error('시트 정보를 찾을 수 없습니다.');
  activeSheetName = first.title;
  activeSheetId = first.sheetId;
}

async function loadHeaderMap(){
  const range = encodeURIComponent(`${activeSheetName}!1:1`);
  const data = await sheetsApi(`/values/${range}`);
  const header = (data.values && data.values[0]) || [];
  const idx = (name) => header.findIndex(h => (h || '').toString().trim() === name);
  let roundIdx = idx('차수'), subjectIdx = idx('과목'), sessionIdx = idx('회차'), periodIdx = idx('교육기간'), linkIdx = idx('링크');
  if(roundIdx === -1 || subjectIdx === -1 || linkIdx === -1){
    roundIdx = 0; subjectIdx = 1; sessionIdx = 2; periodIdx = 3; linkIdx = 4;
  }
  headerMap = { roundIdx, subjectIdx, sessionIdx, periodIdx, linkIdx, colCount: Math.max(header.length, linkIdx + 1, 5) };
}

async function loadRowsViaApi(){
  const range = encodeURIComponent(`${activeSheetName}!A:${colLetter(Math.max(headerMap.colCount - 1, 4))}`);
  const data = await sheetsApi(`/values/${range}`);
  const values = data.values || [];
  const rows = [];
  for(let i = 1; i < values.length; i++){
    const raw = values[i] || [];
    const get = (idx) => (idx > -1 && raw[idx] != null) ? String(raw[idx]).trim() : '';
    const round = get(headerMap.roundIdx);
    const subject = get(headerMap.subjectIdx);
    const session = get(headerMap.sessionIdx);
    const period = get(headerMap.periodIdx);
    let link = get(headerMap.linkIdx);
    if(!round || !subject || !link) continue;
    if(!/^https?:\/\//i.test(link)) link = 'https://' + link;
    const padded = raw.slice();
    while(padded.length < headerMap.colCount) padded.push('');
    rows.push({ round, subject, session, period, link, rowNumber: i + 1, raw: padded });
  }
  return rows;
}

function colLetter(idx){
  let s = '';
  idx = idx + 1;
  while(idx > 0){
    const rem = (idx - 1) % 26;
    s = String.fromCharCode(65 + rem) + s;
    idx = Math.floor((idx - 1) / 26);
  }
  return s;
}

async function loadAdminData(isManual){
  if(isManual) refreshBtn.classList.add('spinning');
  try{
    const rows = await loadRowsViaApi();
    allRows = rows;
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    setStatus(true, `마지막 업데이트: ${timeStr} · 총 ${allRows.length}개 과목`, true);
    render();

    console.error('관리자 데이터 로드 실패:', err);
    setStatus(false, '데이터를 불러오지 못했습니다.');
    contentEl.innerHTML = `<div class="error-box">
      관리자 권한으로 시트를 불러오지 못했습니다.<br>
      이 구글 계정에 스프레드시트 편집 권한이 있는지 확인해주세요.<br>
      <span style="display:block;margin-top:10px;font-size:11.5px;color:var(--ink-soft);">상세 오류: ${escapeHtml(err.message || String(err))}</span>
    </div>`;
  }finally{
    if(isManual) setTimeout(() => refreshBtn.classList.remove('spinning'), 400);
  }
}

async function saveRowToSheet(rowData, existingRow){
  const arr = existingRow ? existingRow.raw.slice() : new Array(headerMap.colCount).fill('');
  arr[headerMap.roundIdx] = rowData.round;
  arr[headerMap.subjectIdx] = rowData.subject;
  if(headerMap.sessionIdx > -1) arr[headerMap.sessionIdx] = rowData.session;
  if(headerMap.periodIdx > -1) arr[headerMap.periodIdx] = rowData.period;
  arr[headerMap.linkIdx] = rowData.link;

  if(existingRow){
    const range = encodeURIComponent(`${activeSheetName}!A${existingRow.rowNumber}:${colLetter(headerMap.colCount - 1)}${existingRow.rowNumber}`);
    await sheetsApi(`/values/${range}?valueInputOption=USER_ENTERED`, {
      method: 'PUT',
      body: JSON.stringify({ values: [arr] }),
    });
  } else {
    const range = encodeURIComponent(`${activeSheetName}!A:${colLetter(headerMap.colCount - 1)}`);
    await sheetsApi(`/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`, {
      method: 'POST',
      body: JSON.stringify({ values: [arr] }),
    });
  }
}

async function deleteRowFromSheet(rowNumber){
  await sheetsApi(':batchUpdate', {
    method: 'POST',
    body: JSON.stringify({
      requests: [{
        deleteDimension: {
          range: { sheetId: activeSheetId, dimension: 'ROWS', startIndex: rowNumber - 1, endIndex: rowNumber },
        },
      }],
    }),
  });
}

function naturalKeyForRound(r){
  const m = String(r).match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : Number.POSITIVE_INFINITY;
}

function fetchSheet(){
  return new Promise((resolve, reject) => {
    const callbackName = 'gsheetCb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    const script = document.createElement('script');

    const timeoutId = setTimeout(() => {
      cleanup();
      reject(new Error('요청 시간이 초과되었습니다 (10초). 네트워크 상태를 확인해주세요.'));
    }, 10000);

    function cleanup(){
      clearTimeout(timeoutId);
      delete window[callbackName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(response){
      cleanup();
      if(!response || response.status === 'error'){
        const msg = (response && response.errors && response.errors[0] && response.errors[0].detailed_message)
          || '시트에 접근할 수 없습니다. 공유 설정을 확인해주세요.';
        reject(new Error(msg));
        return;
      }
      resolve(response.table);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('스크립트 로드에 실패했습니다. 시트 ID 또는 네트워크 연결을 확인해주세요.'));
    };

    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?headers=1&tqx=out:json;responseHandler:${callbackName}&t=${Date.now()}`;
    document.body.appendChild(script);
  });
}

function findColIndex(cols, names){
  for(let i = 0; i < cols.length; i++){
    const label = (cols[i].label || '').trim();
    if(names.includes(label)) return i;
  }
  return -1;
}

function parseTable(table){
  const cols = table.cols || [];
  let roundIdx = findColIndex(cols, ['차수']);
  let subjectIdx = findColIndex(cols, ['과목']);
  let sessionIdx = findColIndex(cols, ['회차']);
  let periodIdx = findColIndex(cols, ['교육기간']);
  let linkIdx = findColIndex(cols, ['링크']);

  if(roundIdx === -1 || subjectIdx === -1 || linkIdx === -1){
    roundIdx = 0; subjectIdx = 1; sessionIdx = 2; periodIdx = 3; linkIdx = 4;
  }

  const rows = [];
  (table.rows || []).forEach(row => {
    const cells = row.c || [];
    const cellStr = (idx) => (idx > -1 && cells[idx] && cells[idx].v != null) ? String(cells[idx].v).trim() : '';
    const round = cellStr(roundIdx);
    const subject = cellStr(subjectIdx);
    const session = cellStr(sessionIdx);
    const period = cellStr(periodIdx);
    let link = cellStr(linkIdx);
    if(!round || !subject || !link) return;
    if(round === '차수' && subject === '과목') return; // 헤더 행이 데이터로 잘못 들어온 경우 방지
    if(!/^https?:\/\//i.test(link)) link = 'https://' + link;
    rows.push({ round, subject, session, period, link });
  });
  return rows;
}

function assignColors(){
  roundColor = {};
  rounds.forEach((r, i) => {
    roundColor[r] = PALETTE[i % PALETTE.length];
  });
}

function render(){
  const seen = new Set();
  rounds = [];
  allRows.forEach(r => { if(!seen.has(r.round)){ seen.add(r.round); rounds.push(r.round); } });
  rounds.sort((a,b) => naturalKeyForRound(a) - naturalKeyForRound(b));
  assignColors();

  const query = searchInput.value.trim().toLowerCase();
  const searching = query.length > 0;
  const mode = searching ? 'search' : currentView;
  searchClear.classList.toggle('visible', searchInput.value.length > 0);
  searchHint.classList.toggle('hidden', searchInput.value.length > 0);

  // 상단 컬러 레전드 점
  dotLegendEl.innerHTML = rounds.map(r => `<span style="background:${roundColor[r].solid}"></span>`).join('');

  // 탭 / 뒤로가기 버튼: 상세 화면일 때만 노출
  if(mode === 'detail' && rounds.length > 0){
    tabsEl.style.display = 'flex';
    backBtn.style.display = 'inline-flex';
    const tabHtml = ['ALL', ...rounds].map(r => {
      const label = r === 'ALL' ? '전체' : r;
      const count = r === 'ALL' ? allRows.length : allRows.filter(x => x.round === r).length;
      const isActive = activeTab === r;
      const color = r === 'ALL' ? '#FFFFFF' : roundColor[r].solid;
      const style = isActive ? `background:${color};` : '';
      const swatch = r === 'ALL'
        ? `<span class="swatch" style="background:linear-gradient(135deg, #2F5FE0, #8EF0D3)"></span>`
        : `<span class="swatch" style="background:${roundColor[r].solid}"></span>`;
      return `<button class="tab ${isActive ? 'active' : ''}" style="${style}" data-round="${escapeAttr(r)}">${swatch}${escapeHtml(label)} <span class="count">${count}</span></button>`;
    }).join('');
    tabsEl.innerHTML = tabHtml;
    tabsEl.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.getAttribute('data-round');
        render();
      });
    });
  } else {
    tabsEl.style.display = 'none';
    backBtn.style.display = 'none';
  }

  if(mode === 'rounds'){
    renderRoundsLanding();
    return;
  }

  let rowsToShow;
  let showBadge;
  if(mode === 'search'){
    rowsToShow = allRows.filter(r => r.subject.toLowerCase().includes(query));
    showBadge = true;
  } else {
    rowsToShow = activeTab === 'ALL' ? allRows : allRows.filter(r => r.round === activeTab);
    showBadge = activeTab === 'ALL';
  }

  if(rowsToShow.length === 0){
    contentEl.innerHTML = `<div class="empty">${mode === 'search' ? '검색 결과가 없습니다.' : '표시할 과목이 없습니다.'}</div>`;
    return;
  }

  contentEl.innerHTML = `<div class="grid">` + rowsToShow.map((r, i) => {
    const c = roundColor[r.round] || PALETTE[0];
    const styleAttr = `--accent:${c.solid};--accent-tint:${c.tint};animation-delay:${Math.min(i * 30, 240)}ms`;
    const innerHtml = `
      <div class="card-body">
        <span class="card-title">${escapeHtml(r.subject)}</span>
        ${(r.session || r.period) ? `<div class="card-meta">
          ${r.session ? `<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>${escapeHtml(r.session)}</span>` : ''}
          ${r.period ? `<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${escapeHtml(r.period)}</span>` : ''}
        </div>` : ''}
      </div>
      <div class="card-bottom">
        ${showBadge ? `<span class="badge">${escapeHtml(r.round)}</span>` : `<span></span>`}
        ${isAdmin
          ? `<a class="go-arrow" href="${escapeAttr(r.link)}" target="_blank" rel="noopener" aria-label="링크 열기"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg></a>`
          : `<span class="go-arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg></span>`}
      </div>
    `;

    if(isAdmin){
      const adminTools = `
      <div class="admin-tools">
        <button class="icon-btn" type="button" data-action="edit" data-row="${r.rowNumber}" aria-label="수정">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <button class="icon-btn danger" type="button" data-action="delete" data-row="${r.rowNumber}" aria-label="삭제">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </div>`;
      return `<div class="card admin-card" style="${styleAttr}">${adminTools}${innerHtml}</div>`;
    }
    return `<a class="card" style="${styleAttr}" href="${escapeAttr(r.link)}" target="_blank" rel="noopener">${innerHtml}</a>`;
  }).join('') + `</div>`;
}

function renderRoundsLanding(){
  if(rounds.length === 0){
    contentEl.innerHTML = `<div class="empty">표시할 차수가 없습니다.</div>`;
    return;
  }
  contentEl.innerHTML = `<div class="round-grid">` + rounds.map((r, i) => {
    const c = roundColor[r];
    const count = allRows.filter(x => x.round === r).length;
    return `
    <button class="round-card" style="--accent:${c.solid};--accent-tint:${c.tint};animation-delay:${Math.min(i * 40, 240)}ms" data-round="${escapeAttr(r)}">
      <div class="round-card-top">
        <span class="round-eyebrow">차수</span>
        <span class="go-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
        </span>
      </div>
      <div>
        <div class="round-name">${escapeHtml(r)}</div>
        <div class="round-count">${count}개 과목</div>
      </div>
    </button>
  `;
  }).join('') + `</div>`;

  contentEl.querySelectorAll('.round-card').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.getAttribute('data-round');
      currentView = 'detail';
      render();
    });
  });
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

function setStatus(ok, message, showAdminBadge){
  const badge = showAdminBadge
    ? `<span class="admin-status-badge"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>관리자 모드</span>`
    : '';
  statusEl.innerHTML = `<span class="status-dot ${ok ? '' : 'error'}"></span>${message}${badge}`;
}

async function load(isManual){
  if(isManual) refreshBtn.classList.add('spinning');
  try{
    const table = await fetchSheet();
    allRows = parseTable(table);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    setStatus(true, `마지막 업데이트: ${timeStr} · 총 ${allRows.length}개 과목`);
    render();
  }catch(err){
    console.error('시트 로드 실패:', err);
    setStatus(false, '데이터를 불러오지 못했습니다.');
    contentEl.innerHTML = `<div class="error-box">
      스프레드시트를 불러오지 못했습니다.<br>
      시트가 <strong>"링크가 있는 모든 사용자에게 공개(뷰어)"</strong>로 공유되어 있는지, 시트 ID가 올바른지 확인해주세요.<br>
      <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?usp=sharing" target="_blank" rel="noopener">스프레드시트 열기</a><br>
      <span style="display:block;margin-top:10px;font-size:11.5px;color:var(--ink-soft);">상세 오류: ${escapeHtml(err.message || String(err))}</span>
    </div>`;
  }finally{
    if(isManual) setTimeout(() => refreshBtn.classList.remove('spinning'), 400);
  }
}

searchInput.addEventListener('input', render);
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchInput.focus();
  render();
});
refreshBtn.addEventListener('click', () => isAdmin ? loadAdminData(true) : load(true));

document.addEventListener('keydown', (e) => {
  if(modalOverlay.classList.contains('visible')){
    if(e.key === 'Escape') closeModal();
    return;
  }
  const tag = document.activeElement && document.activeElement.tagName;
  if(e.key === '/' && document.activeElement !== searchInput && tag !== 'INPUT' && tag !== 'TEXTAREA'){
    e.preventDefault();
    searchInput.focus();
  } else if(e.key === 'Escape' && document.activeElement === searchInput){
    if(searchInput.value){
      searchInput.value = '';
      render();
    } else {
      searchInput.blur();
    }
  }
});

load(false);
setInterval(() => { isAdmin ? loadAdminData(false) : load(false); }, AUTO_REFRESH_MS);
</script>

</body>
</html>
